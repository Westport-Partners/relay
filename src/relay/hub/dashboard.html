            style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);"
            ${readOnlyAttr}>
            <option value="SEV1">SEV1</option>
            <option value="SEV2">SEV2</option>
            <option value="SEV3" selected>SEV3</option>
            <option value="SEV4">SEV4</option>
          </select>
        </label>
        <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;">
          Environment (optional)
          <input type="text" id="maint-syn-env" placeholder="prod"
            style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);"
            ${readOnlyAttr}>
        </label>
      </div>
      <div class="settings-row">
        <button class="btn-primary" id="btn-maint-trigger"${readOnlyAttr}>Trigger test incident</button>
        <span id="maint-trigger-msg" class="settings-inline-msg"></span>
      </div>
    </div>

    <!-- Card B: Purge Incidents & Metrics -->
    <div class="settings-card">
      <div class="settings-card-title">Purge Incidents &amp; Metrics</div>
      <div class="info-banner" style="border-left-color:var(--red);">
        Permanently deletes incidents and their companion records (timeline, metrics, etc.) from storage.
        Use <strong>Preview</strong> first to see what would be affected before committing.
        This action cannot be undone.
      </div>

      <div style="margin-bottom:10px;">
        <div style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Time bound</div>
        <div class="maint-toggle-group">
          <button class="maint-toggle-btn active" id="btn-maint-before" type="button">Before</button>
          <button class="maint-toggle-btn" id="btn-maint-after" type="button">After</button>
        </div>
      </div>

      <div style="margin-bottom:10px;">
        <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;max-width:320px;">
          <span id="maint-ts-label">Purge incidents created before</span>
          <input type="datetime-local" id="maint-ts"
            style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);"
            ${readOnlyAttr}>
        </label>
      </div>

      <div style="margin-bottom:14px;display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="maint-syn-only" ${readOnlyAttr ? 'disabled' : ''}>
        <label for="maint-syn-only" style="font-size:12px;color:var(--text);cursor:pointer;">
          Only synthetic/test incidents
        </label>
      </div>

      <div class="settings-row">
        <button class="btn-sm" id="btn-maint-preview"${readOnlyAttr}>Preview</button>
        <button class="btn-danger" id="btn-maint-purge"${readOnlyAttr}>Purge</button>
        <span id="maint-purge-msg" class="settings-inline-msg"></span>
      </div>
      <div id="maint-preview-result" style="margin-top:8px;font-size:12px;color:var(--text-dim);font-family:var(--mono);display:none;"></div>
    </div>`;

  // --- Card A: Trigger synthetic incident ---
  const triggerBtn = document.getElementById('btn-maint-trigger');
  const triggerMsg = document.getElementById('maint-trigger-msg');
  if (triggerBtn && CAN_WRITE) {
    triggerBtn.addEventListener('click', async () => {
      triggerMsg.textContent = '';
      triggerMsg.className = 'settings-inline-msg';
      triggerBtn.disabled = true;
      triggerBtn.textContent = 'Triggering…';

      const appName = (document.getElementById('maint-syn-app').value || '').trim();
      const severity = document.getElementById('maint-syn-sev').value || 'SEV3';
      const environment = (document.getElementById('maint-syn-env').value || '').trim();

      const body = {};
      if (appName)    body.app_name    = appName;
      if (severity)   body.severity    = severity;
      if (environment) body.environment = environment;

      try {
        const r = await fetch('/synthetic/incident', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (r.ok) {
          const data = await r.json().catch(() => ({}));
          const cid = data.correlation_id || '(unknown)';
          triggerMsg.textContent = '✓ triggered — ' + cid + ' · will appear in Incidents / Fleet';
          triggerMsg.className = 'settings-inline-msg ok';
          setTimeout(() => {
            if (triggerMsg) { triggerMsg.textContent = ''; triggerMsg.className = 'settings-inline-msg'; }
          }, 12000);
        } else if (r.status === 403) {
          triggerMsg.textContent = '✗ Not authorised.';
          triggerMsg.className = 'settings-inline-msg err';
        } else {
          const b = await r.json().catch(() => ({}));
          triggerMsg.textContent = '✗ ' + (b.detail || 'Error ' + r.status);
          triggerMsg.className = 'settings-inline-msg err';
        }
      } catch (_) {
        triggerMsg.textContent = '✗ Network error — please retry.';
        triggerMsg.className = 'settings-inline-msg err';
      }
      triggerBtn.disabled = false;
      triggerBtn.textContent = 'Trigger test incident';
    });
  }

  // --- Card B: Before/After toggle ---
  let purgeDirection = 'before'; // 'before' | 'after'
  const btnBefore = document.getElementById('btn-maint-before');
  const btnAfter  = document.getElementById('btn-maint-after');
  const tsLabel   = document.getElementById('maint-ts-label');

  if (btnBefore && btnAfter) {
    btnBefore.addEventListener('click', () => {
      purgeDirection = 'before';
      btnBefore.classList.add('active'); btnAfter.classList.remove('active');
      if (tsLabel) tsLabel.textContent = 'Purge incidents created before';
    });
    btnAfter.addEventListener('click', () => {
      purgeDirection = 'after';
      btnAfter.classList.add('active'); btnBefore.classList.remove('active');
      if (tsLabel) tsLabel.textContent = 'Purge incidents created after';
    });
  }

  // Helper: build purge body from current form state.
  function buildPurgeBody(dryRun) {
    const tsVal = (document.getElementById('maint-ts').value || '').trim();
    const synOnly = document.getElementById('maint-syn-only').checked;
    const tsIso = tsVal ? new Date(tsVal).toISOString() : null;
    return {
      before: purgeDirection === 'before' ? tsIso : null,
      after:  purgeDirection === 'after'  ? tsIso : null,
      synthetic_only: synOnly,
      dry_run: dryRun,
    };
  }

  // --- Card B: Preview ---
  const previewBtn = document.getElementById('btn-maint-preview');
  const purgeMsg   = document.getElementById('maint-purge-msg');
  const previewResult = document.getElementById('maint-preview-result');
  if (previewBtn && CAN_WRITE) {
    previewBtn.addEventListener('click', async () => {
      purgeMsg.textContent = '';
      purgeMsg.className = 'settings-inline-msg';
      if (previewResult) { previewResult.style.display = 'none'; previewResult.textContent = ''; }
      previewBtn.disabled = true;
      previewBtn.textContent = 'Previewing…';

      const payload = buildPurgeBody(true);
      try {
        const r = await fetch('/admin/purge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (r.ok) {
          const d = await r.json().catch(() => ({}));
          const txt = 'Would delete ' + (d.matched ?? '?') + ' incident(s) (' + (d.synthetic ?? '?') + ' synthetic), plus ' + (d.companions_deleted ?? '?') + ' companion record(s)';
          if (previewResult) { previewResult.textContent = txt; previewResult.style.display = 'block'; }
        } else if (r.status === 403) {
          purgeMsg.textContent = '✗ Not authorised.';
          purgeMsg.className = 'settings-inline-msg err';
        } else {
          const b = await r.json().catch(() => ({}));
          purgeMsg.textContent = '✗ ' + (b.detail || 'Error ' + r.status);
          purgeMsg.className = 'settings-inline-msg err';
        }
      } catch (_) {
        purgeMsg.textContent = '✗ Network error — please retry.';
        purgeMsg.className = 'settings-inline-msg err';
      }
      previewBtn.disabled = false;
      previewBtn.textContent = 'Preview';
    });
  }

  // --- Card B: Purge (destructive) ---
  const purgeBtn = document.getElementById('btn-maint-purge');
  if (purgeBtn && CAN_WRITE) {
    purgeBtn.addEventListener('click', async () => {
      purgeMsg.textContent = '';
      purgeMsg.className = 'settings-inline-msg';

      // Safety guard: refuse if no timestamp AND synthetic_only is unchecked.
      const tsVal = (document.getElementById('maint-ts').value || '').trim();
      const synOnly = document.getElementById('maint-syn-only').checked;
      if (!tsVal && !synOnly) {
        alert('Safety check: enter a timestamp or check "Only synthetic/test incidents" before purging.');
        return;
      }

      const payload = buildPurgeBody(false);
      const boundDesc = payload.before
        ? 'before ' + payload.before
        : payload.after
          ? 'after ' + payload.after
          : '(no time bound)';
      const scopeDesc = payload.synthetic_only ? 'synthetic incidents only' : 'all incidents';
      if (!confirm('Permanently delete ' + scopeDesc + ' ' + boundDesc + '?\n\nThis cannot be undone.')) return;

      purgeBtn.disabled = true;
      purgeBtn.textContent = 'Purging…';
      if (previewResult) { previewResult.style.display = 'none'; }

      try {
        const r = await fetch('/admin/purge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (r.ok) {
          const d = await r.json().catch(() => ({}));
          purgeMsg.textContent = '✓ Deleted ' + (d.deleted ?? d.matched ?? '?') + ' incident(s)';
          purgeMsg.className = 'settings-inline-msg ok';
          setTimeout(() => {
            if (purgeMsg) { purgeMsg.textContent = ''; purgeMsg.className = 'settings-inline-msg'; }
          }, 10000);
        } else if (r.status === 403) {
          purgeMsg.textContent = '✗ Not authorised.';
          purgeMsg.className = 'settings-inline-msg err';
        } else {
          const b = await r.json().catch(() => ({}));
          purgeMsg.textContent = '✗ ' + (b.detail || 'Error ' + r.status);
          purgeMsg.className = 'settings-inline-msg err';
        }
      } catch (_) {
        purgeMsg.textContent = '✗ Network error — please retry.';
        purgeMsg.className = 'settings-inline-msg err';
      }
      purgeBtn.disabled = false;
      purgeBtn.textContent = 'Purge';
    });
  }
}

// -----------------------------------------------------------------------
// Schedule view
// -----------------------------------------------------------------------
const SCHED_DAYS = ['mon','tue','wed','thu','fri','sat','sun'];
const SCHED_DAY_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const SCHED_SHIFTS = ['night','day','evening'];
const SCHED_SHIFT_LABELS = ['Night (00-08)','Day (08-16)','Evening (16-24)'];
// On-call roles shown as tabs on the Schedule grid (one 7x3 grid per role).
const SCHED_ROLES = ['primary','secondary','manager'];
const SCHED_ROLE_LABELS = { primary: 'Primary', secondary: 'Secondary', manager: 'Manager' };
let currentRole = 'primary';  // active role tab

// Wall-clock parts (date + hour + weekday) of an instant in the team timezone.
// Uses Intl so it works for any IANA zone without a date library. Falls back to
// UTC if TEAM_TZ is somehow invalid.
function teamNowParts() {
  const now = new Date();
  let parts;
  try {
    const fmt = new Intl.DateTimeFormat('en-CA', {
      timeZone: TEAM_TZ, year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', hour12: false, weekday: 'short',
    });
    parts = {};
    fmt.formatToParts(now).forEach(p => { parts[p.type] = p.value; });
  } catch (_) {
    // Invalid zone — fall back to UTC parts.
    return {
      date: now.toISOString().slice(0, 10),
      hour: now.getUTCHours(),
      dow: now.getUTCDay(),
    };
  }
  // 'en-CA' gives YYYY-MM-DD ordering for date parts.
  const date = `${parts.year}-${parts.month}-${parts.day}`;
  let hour = parseInt(parts.hour, 10);
  if (hour === 24) hour = 0; // some engines emit '24' for midnight
  const dowMap = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
  return { date, hour, dow: dowMap[parts.weekday] ?? 0 };
}

function getThisMonday() {
  // The week's Monday in the TEAM timezone (RELAY_TZ), matching the server's
  // monday_of() applied to team-local time. Pure date math on the team-local
  // calendar date avoids the UTC/local desync that broke the grid before.
  const { date, dow } = teamNowParts();
  const diff = (dow === 0) ? -6 : (1 - dow); // back up to Monday
  return addDays(date, diff);
}

// Which shift (0=night,1=day,2=evening) covers a given hour-of-day.
function shiftIndexForHour(hour) {
  if (hour < 8) return 0;
  if (hour < 16) return 1;
  return 2;
}

function addDays(isoDate, n) {
  const d = new Date(isoDate + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + n);
  return d.toISOString().slice(0, 10);
}

function fmtMonDate(isoDate) {
  const d = new Date(isoDate + 'T00:00:00Z');
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', timeZone: 'UTC' });
}

// Null until first viewed, so it picks up TEAM_TZ resolved by initAuth() rather
// than the module-load default. Prev/Next set it to a concrete week thereafter.
let currentWeekStart = null;

async function loadSchedule() {
  const view = document.getElementById('view-schedule');
  if (currentWeekStart === null) currentWeekStart = getThisMonday();
  view.innerHTML = '<div style="color:var(--text-dim);padding:20px;">Loading…</div>';

  // Fetch contacts for name resolution and current schedule
  let contacts = [], schedData = null;
  try {
    const [rc, rs] = await Promise.all([
      fetch('/contacts'),
      fetch('/schedule?week=' + currentWeekStart),
    ]);
    if (rc.ok) contacts = await rc.json();
    if (rs.ok) schedData = await rs.json();
  } catch (_) {
    view.innerHTML = '<div style="color:var(--red);padding:20px;">Failed to load schedule.</div>';
    return;
  }

  renderSchedule(view, schedData, contacts);
}

function renderSchedule(view, schedData, contacts) {
  const nameMap = new Map(contacts.map(c => [c.contact_id, c.name || c.contact_id]));

  // Build toolbar
  const autoBtn = CAN_WRITE
    ? `<button class="btn-primary" id="btn-auto-schedule" style="font-size:12px;padding:4px 14px;">&#9654; Auto-schedule</button>`
    : `<button class="btn-primary" disabled title="Read-only: authentication not configured" style="opacity:.45;cursor:not-allowed;font-size:12px;padding:4px 14px;">&#9654; Auto-schedule</button>`;

  const allSlots = schedData && Array.isArray(schedData.slots) ? schedData.slots : [];
  const covByRole = (schedData && schedData.coverage_by_role) || {};
  // Roles present in this schedule (fall back to the default trio).
  const roles = (schedData && Array.isArray(schedData.roles) && schedData.roles.length)
    ? schedData.roles : SCHED_ROLES;
  if (!roles.includes(currentRole)) currentRole = roles[0] || 'primary';

  // Slots for the active role only (legacy rows without a role => primary).
  const slots = allSlots.filter(s => (s.role || 'primary') === currentRole);

  // Role tabs, each showing that role's covered/total + a gap dot.
  const tabsHtml = `<div class="sched-role-tabs">${roles.map(role => {
    const ct = covByRole[role] || null;
    const isGap = ct && ct[0] < ct[1];
    const cntTxt = ct ? ` <span class="sched-tab-cov${isGap ? ' gap' : ''}">${ct[0]}/${ct[1]}</span>` : '';
    return `<button class="sched-role-tab${role === currentRole ? ' active' : ''}" data-role="${esc(role)}">${esc(SCHED_ROLE_LABELS[role] || role)}${cntTxt}</button>`;
  }).join('')}</div>`;

  // Per-role coverage line for the active role.
  const ct = covByRole[currentRole] || (schedData ? [slots.filter(s => s.contact_id).length, slots.length] : [0, 21]);
  const roleGaps = ct[1] - ct[0];
  const gapsHtml = roleGaps > 0
    ? `<span style="color:var(--red);font-weight:700;">${roleGaps} gap${roleGaps !== 1 ? 's' : ''}</span>`
    : `<span style="color:var(--green);">0 gaps</span>`;
  const coverageHtml = `<div class="schedule-coverage">${esc(SCHED_ROLE_LABELS[currentRole] || currentRole)}: ${ct[0]} / ${ct[1]} shifts covered &nbsp;&middot;&nbsp; ${gapsHtml}</div>`;

  // Per-person tally chips for the active role.
  const roleCounts = {};
  slots.forEach(s => { if (s.contact_id) roleCounts[s.contact_id] = (roleCounts[s.contact_id] || 0) + 1; });
  const tallyHtml = Object.keys(roleCounts).length
    ? `<div class="schedule-tallies">${Object.entries(roleCounts).map(([cid, n]) =>
        `<span class="tally-chip">${esc(nameMap.get(cid) || cid)}: ${n}</span>`
      ).join('')}</div>`
    : '';

  // Build 7x3 grid for the active role.
  let gridHtml = '';
  if (allSlots.length === 0) {
    gridHtml = `<div class="schedule-empty-msg">No schedule yet &mdash; click Auto-schedule to generate one.</div>`;
  } else {
    const slotMap = new Map();
    slots.forEach(s => slotMap.set(s.date + '|' + s.shift, s));

    const headerRow = `<tr>
      <th class="day-label">Day</th>
      ${SCHED_SHIFT_LABELS.map(l => `<th>${esc(l)}</th>`).join('')}
    </tr>`;

    // Highlight the cell that is "on call right now" in the team timezone.
    const tnow = teamNowParts();
    const nowShiftIdx = shiftIndexForHour(tnow.hour);

    const dataRows = SCHED_DAYS.map((day, di) => {
      const date = addDays(currentWeekStart, di);
      const isToday = date === tnow.date;
      const cells = SCHED_SHIFTS.map((shift, si) => {
        const isNow = isToday && si === nowShiftIdx;
        const nowCls = isNow ? ' sched-now' : '';
        const s = slotMap.get(date + '|' + shift);
        if (!s) return `<td class="sched-empty${nowCls}">—</td>`;
        const ovTag = s.overridden ? ' <span class="sched-ovr-tag" title="Ad-hoc override">cover</span>' : '';
        if (s.contact_id === null || s.contact_id === undefined) {
          return `<td class="sched-gap${nowCls}">GAP${ovTag}</td>`;
        }
        return `<td class="sched-assigned${nowCls}">${esc(nameMap.get(s.contact_id) || s.contact_id)}${isNow ? ' <span class="sched-now-tag">now</span>' : ''}${ovTag}</td>`;
      }).join('');
      return `<tr${isToday ? ' class="sched-today-row"' : ''}>
        <td class="day-label">${esc(SCHED_DAY_LABELS[di])} <span style="font-size:10px;color:var(--text-dim);">${esc(fmtMonDate(date))}</span></td>
        ${cells}
      </tr>`;
    }).join('');

    gridHtml = `
      <div class="schedule-grid-wrap">
        <table class="schedule-table">
          <thead>${headerRow}</thead>
          <tbody>${dataRows}</tbody>
        </table>
      </div>`;
  }

  view.innerHTML = `
    <div class="view-toolbar"><h2>Schedule</h2></div>
    <div class="schedule-toolbar">
      <button class="btn-sm" id="btn-week-prev">&#8592; Prev</button>
      <span class="schedule-week-label">Week of ${esc(fmtMonDate(currentWeekStart))}</span>
      <button class="btn-sm" id="btn-week-next">Next &#8594;</button>
      ${autoBtn}
      <span id="schedule-auto-err" style="font-size:12px;color:var(--red);"></span>
      <span style="font-size:11px;color:var(--text-dim);margin-left:auto;">Times shown in ${esc(TEAM_TZ)}</span>
    </div>
    ${schedData && allSlots.length ? tabsHtml : ''}
    ${schedData ? coverageHtml : ''}
    ${schedData ? tallyHtml : ''}
    ${gridHtml}`;

  // Role tab switching — re-render in place (no refetch needed).
  view.querySelectorAll('.sched-role-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      currentRole = tab.dataset.role;
      renderSchedule(view, schedData, contacts);
    });
  });

  // Prev/Next week
  document.getElementById('btn-week-prev').addEventListener('click', () => {
    currentWeekStart = addDays(currentWeekStart, -7);
    loadSchedule();
  });
  document.getElementById('btn-week-next').addEventListener('click', () => {
    currentWeekStart = addDays(currentWeekStart, 7);
    loadSchedule();
  });

  // Auto-schedule
  const autoEl = document.getElementById('btn-auto-schedule');
  if (autoEl && CAN_WRITE) {
    autoEl.addEventListener('click', async () => {
      const errEl = document.getElementById('schedule-auto-err');
      autoEl.disabled = true;
      autoEl.textContent = 'Scheduling…';
      if (errEl) errEl.textContent = '';
      try {
        const r = await fetch('/schedule/auto?week=' + currentWeekStart, { method: 'POST' });
        if (r.ok) {
          const data = await r.json();
          // Re-fetch contacts in case they changed, then re-render
          const rc = await fetch('/contacts');
          const ctcts = rc.ok ? await rc.json() : contacts;
          renderSchedule(view, data, ctcts);
        } else {
          const body = await r.json().catch(() => ({}));
          if (errEl) errEl.textContent = r.status === 403 ? '✗ not authorised' : ('✗ ' + (body.detail || 'Error ' + r.status));
          autoEl.disabled = false;
          autoEl.textContent = '▶ Auto-schedule';
        }
      } catch (_) {
        if (errEl) errEl.textContent = '✗ network error';
        autoEl.disabled = false;
        autoEl.textContent = '▶ Auto-schedule';
      }
    });
  }
}

// Clicking a fleet tile with open incidents jumps to that app's incidents.
document.getElementById('grid').addEventListener('click', e => {
  const tileEl = e.target.closest('.tile');
  if (!tileEl) return;
  const t = tiles.get(tileEl.dataset.key);
  if (t && t.open_incidents > 0) {
    document.querySelector('.nav-btn[data-view="incidents"]').click();
  }
});

// -----------------------------------------------------------------------
// Rules view — ONE unified table over BOTH rule types (routing + ignore).
// Each row carries _type ('routing'|'ignore'); a Type column distinguishes
// them. Both types share one DynamoDB table; this screen is the single place
// to view/create/edit/delete either kind. New-rule defaults to a routing rule
// but a Type toggle in the form switches to ignore.
// -----------------------------------------------------------------------
let rulesData = [];          // combined cached rows, each tagged with _type
let rulesFilterVal = '';     // current filter string
let routingRulesData = [];   // routing-only cache (used by incident drawer)
let escalationPolicies = []; // cached [{policy_id, name}]
let newRuleType = 'routing'; // 'routing' | 'ignore' — type for the New rule form

async function loadRules() {
  const view = document.getElementById('view-rules');
  view.innerHTML = '<div style="color:var(--text-dim);padding:20px;">Loading…</div>';

  let routing = [], ignore = [], policies = [], routeDev = {}, ignoreDev = {};
  try {
    const [rr, ig, rp, rd, id] = await Promise.all([
      fetch('/routing-rules'),
      fetch('/rules'),
      fetch('/escalation-policies'),
      fetch('/routing-rules/deviation'),
      fetch('/rules/deviation'),
    ]);
    if (rr.ok) { const d = await rr.json(); routing = d.rules || []; }
    if (ig.ok) { const d = await ig.json(); ignore  = d.rules || []; }
    if (rp.ok) { const d = await rp.json(); policies = d.policies || []; }
    if (rd.ok) routeDev = await rd.json();
    if (id.ok) ignoreDev = await id.json();
  } catch (_) {
    view.innerHTML = '<div style="color:var(--red);padding:20px;">Failed to load rules.</div>';
    return;
  }

  escalationPolicies = policies;
  routingRulesData = routing.slice();
  // Tag each row with its kind so the unified table can branch per row.
  const combined = []
    .concat(routing.map(r => Object.assign({ _type: 'routing' }, r)))
    .concat(ignore.map(r  => Object.assign({ _type: 'ignore'  }, r)));
  // Routing first (priority asc), then ignore (most-triggered first).
  combined.sort((a, b) => {
    if (a._type !== b._type) return a._type === 'routing' ? -1 : 1;
    if (a._type === 'routing') return (a.priority || 0) - (b.priority || 0);
    return (b.trigger_count || 0) - (a.trigger_count || 0);
  });
  rulesData = combined;

  renderRulesSection(routeDev, ignoreDev);
}

function renderRulesSection(routeDev, ignoreDev) {
  const view = document.getElementById('view-rules');

  const readOnlyNote = !CAN_WRITE
    ? '<div class="info-banner" style="border-left-color:var(--amber);">&#128274; Read-only — authentication not configured. Write access is required to manage rules.</div>'
    : '';

  const devParts = [];
  if (routeDev && routeDev.deviates) {
    devParts.push(`Routing rules differ from baseline (DB ${esc(String(routeDev.db_count ?? '?'))}, file ${esc(String(routeDev.baseline_count ?? '?'))}) — <a href="/routing-rules/download" style="color:var(--teal-light);text-decoration:underline;" download>download routing-rules.yaml</a>`);
  }
  if (ignoreDev && ignoreDev.deviates) {
    devParts.push(`Ignore rules differ from baseline (DB ${esc(String(ignoreDev.db_count ?? '?'))}, file ${esc(String(ignoreDev.baseline_count ?? '?'))}) — <a href="/rules/download" style="color:var(--teal-light);text-decoration:underline;" download>download routing.yaml</a>`);
  }
  const devBanner = devParts.length
    ? `<div class="info-banner" style="border-left-color:var(--amber);margin-bottom:14px;">&#9888; ${devParts.join('<br>')} to persist the current rule set to your repository.</div>`
    : '';

  const newRuleBtn = CAN_WRITE
    ? `<button class="btn-primary" id="btn-new-rule">+ New rule</button>`
    : `<button class="btn-primary" disabled title="Read-only: authentication not configured" style="opacity:.45;cursor:not-allowed;">+ New rule</button>`;

  view.innerHTML = `
    <div class="view-toolbar"><h2>Rules</h2>${newRuleBtn}</div>
    ${readOnlyNote}
    <div class="settings-card" style="max-width:none;">
      <div class="settings-card-title">About rules</div>
      <div class="info-banner">
        <strong>Routing</strong> rules decide <em>how</em> an alarm pages — its severity, escalation policy, and streams (Team / Central).
        They are evaluated in priority order (lowest first); the first match wins. Alarms matching no routing rule use the default policy and a derived severity (shown as <span style="color:var(--amber);">catch-all</span> on the incident).
        <strong>Ignore</strong> rules drop matching alarms entirely — never paged, never counted, no incident created.
        Both live in one table; use the Type column to tell them apart.
      </div>
    </div>
    ${devBanner}
    <div id="rules-new-form" style="display:none;margin-bottom:14px;"></div>
    <div style="margin-bottom:10px;">
      <input type="text" id="rules-filter" placeholder="Filter by match / policy / note…" value="${esc(rulesFilterVal)}"
        style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);width:100%;max-width:400px;">
    </div>
    <div id="rules-table-wrap"></div>`;

  // Wire new-rule button — opens a form whose Type toggle picks routing|ignore.
  const newBtn = document.getElementById('btn-new-rule');
  if (newBtn && CAN_WRITE) {
    newBtn.addEventListener('click', () => {
      const formWrap = document.getElementById('rules-new-form');
      if (formWrap.style.display !== 'none') { formWrap.style.display = 'none'; return; }
      formWrap.style.display = 'block';
      newRuleType = 'routing';
      renderNewRuleForm(formWrap);
    });
  }

  const filterEl = document.getElementById('rules-filter');
  if (filterEl) {
    filterEl.addEventListener('input', () => {
      rulesFilterVal = filterEl.value;
      renderRulesTable();
    });
  }

  renderRulesTable();
}

// New-rule form with a Type toggle (Routing | Ignore) at the top.
function renderNewRuleForm(formWrap) {
  const toggle = `
    <div style="margin-bottom:12px;">
      <div style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Rule type</div>
      <div class="maint-toggle-group">
        <button class="maint-toggle-btn${newRuleType==='routing'?' active':''}" id="newrule-type-routing" type="button">Routing &mdash; how it pages</button>
        <button class="maint-toggle-btn${newRuleType==='ignore'?' active':''}" id="newrule-type-ignore" type="button">Ignore &mdash; drop it</button>
      </div>
    </div>`;
  const inner = document.createElement('div');
  if (newRuleType === 'routing') {
    inner.innerHTML = routingRuleFormHtml(null);
    formWrap.innerHTML = toggle;
    formWrap.appendChild(inner);
    wireRoutingRuleForm(inner, null, async (body) => {
      return fetch('/routing-rules', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    }, () => { formWrap.style.display = 'none'; loadRules(); });
  } else {
    inner.innerHTML = ignoreRuleFormHtml(null);
    formWrap.innerHTML = toggle;
    formWrap.appendChild(inner);
    wireIgnoreRuleForm(inner, null, async (body) => {
      return fetch('/rules', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    }, () => { formWrap.style.display = 'none'; loadRules(); });
  }
  const rt = document.getElementById('newrule-type-routing');
  const it = document.getElementById('newrule-type-ignore');
  if (rt) rt.addEventListener('click', () => { if (newRuleType !== 'routing') { newRuleType = 'routing'; renderNewRuleForm(formWrap); } });
  if (it) it.addEventListener('click', () => { if (newRuleType !== 'ignore')  { newRuleType = 'ignore';  renderNewRuleForm(formWrap); } });
}

function renderRulesTable() {
  const wrap = document.getElementById('rules-table-wrap');
  if (!wrap) return;
  const q = rulesFilterVal.trim().toLowerCase();
  const filtered = q
    ? rulesData.filter(r =>
        (r.app_name || '').toLowerCase().includes(q) ||
        (r.alarm_name || '').toLowerCase().includes(q) ||
        (r.alarm_name_prefix || '').toLowerCase().includes(q) ||
        (r.alarm_name_regex || '').toLowerCase().includes(q) ||
        (r.namespace_prefix || '').toLowerCase().includes(q) ||
        (r.escalation_policy_id || '').toLowerCase().includes(q) ||
        (r.note || '').toLowerCase().includes(q) ||
        (r.environment || '').toLowerCase().includes(q))
    : rulesData;

  if (!filtered.length) {
    wrap.innerHTML = '<div style="color:var(--text-dim);padding:20px 0;">' + (q ? 'No rules match the filter.' : 'No rules configured.') + '</div>';
    return;
  }

  const rows = filtered.map(rule => {
    const isRouting = rule._type === 'routing';
    const typeChip = isRouting
      ? '<span class="tag-chip" style="border-color:var(--teal);"><span class="tag-v" style="color:var(--teal-light);">routing</span></span>'
      : '<span class="tag-chip" style="border-color:var(--amber);"><span class="tag-v" style="color:var(--amber);">ignore</span></span>';

    // Match chips — union of both rule kinds' matchers.
    const matchParts = [];
    if (rule.app_name)          matchParts.push(`<span class="tag-chip"><span class="tag-k">app</span><span class="tag-v">${esc(rule.app_name)}</span></span>`);
    if (rule.alarm_name_prefix) matchParts.push(`<span class="tag-chip"><span class="tag-k">prefix</span><span class="tag-v">${esc(rule.alarm_name_prefix)}</span></span>`);
    else if (rule.alarm_name)   matchParts.push(`<span class="tag-chip"><span class="tag-k">alarm</span><span class="tag-v">${esc(rule.alarm_name)}</span></span>`);
    if (rule.alarm_name_regex)  matchParts.push(`<span class="tag-chip"><span class="tag-k">regex</span><span class="tag-v">${esc(rule.alarm_name_regex)}</span></span>`);
    if (rule.namespace_prefix)  matchParts.push(`<span class="tag-chip"><span class="tag-k">ns</span><span class="tag-v">${esc(rule.namespace_prefix)}</span></span>`);
    if (rule.environment)       matchParts.push(`<span class="tag-chip"><span class="tag-k">env</span><span class="tag-v">${esc(rule.environment)}</span></span>`);
    if (rule.account_id)        matchParts.push(`<span class="tag-chip"><span class="tag-k">acct</span><span class="tag-v">${esc(rule.account_id)}</span></span>`);
    const tagsObj = (rule.tag_filters && typeof rule.tag_filters === 'object') ? rule.tag_filters
                  : (rule.tags && typeof rule.tags === 'object') ? rule.tags : {};
    Object.entries(tagsObj).forEach(([k, v]) =>
      matchParts.push(`<span class="tag-chip"><span class="tag-k">${esc(k)}</span><span class="tag-v">${esc(String(v))}</span></span>`));
    if (!matchParts.length) matchParts.push('<span style="color:var(--text-faint);font-size:11px;">any</span>');

    // Priority (routing only)
    const priorityHtml = isRouting
      ? `<span style="font-family:var(--mono);">${esc(String(rule.priority ?? ''))}</span>`
      : '<span style="color:var(--text-faint);">—</span>';

    // Outcome column: routing → sev + policy + streams; ignore → "drop".
    let outcomeHtml;
    if (isRouting) {
      const sevHtml = rule.severity_override
        ? `<span class="inc-sev ${esc(rule.severity_override)}" style="font-size:11px;">${esc(rule.severity_override)}</span>`
        : `<span style="color:var(--text-faint);font-size:11px;">derived sev</span>`;
      const pol = escalationPolicies.find(p => p.policy_id === rule.escalation_policy_id);
      const polHtml = pol
        ? `<span style="font-size:12px;">${esc(pol.name)}</span>`
        : `<span style="font-family:var(--mono);font-size:11px;color:var(--text-dim);">${esc(rule.escalation_policy_id || '—')}</span>`;
      const streams = Array.isArray(rule.streams) ? rule.streams : [];
      const streamsHtml = streams.map(s => `<span class="tag-chip"><span class="tag-v">${esc(s)}</span></span>`).join('');
      outcomeHtml = `<div class="tag-grid" style="margin:0;align-items:center;">${sevHtml} ${polHtml} ${streamsHtml}</div>`;
    } else {
      const note = rule.note || '';
      const noteTrunc = note.length > 50 ? note.slice(0, 50) + '…' : note;
      outcomeHtml = `<span style="color:var(--amber);font-size:11px;">drop</span>`
        + (note ? ` <span style="color:var(--text-dim);font-size:11px;font-family:var(--mono);" title="${esc(note)}">${esc(noteTrunc)}</span>` : '');
    }

    // Count column: routing match_count / ignore trigger_count.
    const count = isRouting ? (rule.match_count || 0) : (rule.trigger_count || 0);

    // Enabled toggle (routing has live enable/disable; ignore shows state only).
    const enabledHtml = isRouting
      ? `<button class="btn-sm btn-toggle-routing" data-rid="${esc(rule.rule_id)}" data-enabled="${rule.enabled ? '1' : '0'}"
          style="min-width:44px;${rule.enabled ? '' : 'opacity:.55;'}" ${!CAN_WRITE ? 'disabled title="Read-only"' : ''}>${rule.enabled ? 'Yes' : 'No'}</button>`
      : `<span style="color:var(--text-dim);font-size:11px;">${rule.enabled === false ? 'No' : 'Yes'}</span>`;

    const writeActions = CAN_WRITE
      ? `<button class="btn-sm btn-edit-anyrule" data-rid="${esc(rule.rule_id)}" data-rtype="${esc(rule._type)}">Edit</button>
         <button class="btn-sm btn-del-anyrule" data-rid="${esc(rule.rule_id)}" data-rtype="${esc(rule._type)}">Delete</button>`
      : `<button class="btn-sm" disabled style="opacity:.4;">Edit</button>
         <button class="btn-sm" disabled style="opacity:.4;">Delete</button>`;

    return `<tr>
      <td>${typeChip}</td>
      <td style="font-family:var(--mono);font-size:12px;text-align:right;color:var(--text);">${priorityHtml}</td>
      <td><div class="tag-grid" style="margin:0;">${matchParts.join('')}</div></td>
      <td>${outcomeHtml}</td>
      <td style="font-family:var(--mono);font-size:12px;text-align:right;color:var(--text);">${count}</td>
      <td>${enabledHtml}</td>
      <td style="white-space:nowrap;"><div style="display:flex;gap:6px;">${writeActions}</div></td>
    </tr>
    <tr id="anyrule-edit-row-${esc(rule._type)}-${esc(rule.rule_id)}" style="display:none;">
      <td colspan="7" style="padding:0;"></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `
    <table class="contacts-table" style="width:100%;">
      <thead>
        <tr>
          <th>Type</th>
          <th style="text-align:right;">Priority</th>
          <th>Match</th>
          <th>Outcome</th>
          <th style="text-align:right;">Count</th>
          <th>Enabled</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;

  // Routing enable/disable toggle
  wrap.querySelectorAll('.btn-toggle-routing').forEach(btn => {
    btn.addEventListener('click', async () => {
      const rid = btn.dataset.rid;
      const nowEnabled = btn.dataset.enabled === '1';
      btn.disabled = true;
      try {
        const r = await fetch('/routing-rules/' + encodeURIComponent(rid), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: !nowEnabled }),
        });
        if (r.ok) { loadRules(); }
        else { const rb = await r.json().catch(() => ({})); alert(r.status === 403 ? 'Not authorised.' : (rb.detail || 'Error ' + r.status)); btn.disabled = false; }
      } catch (_) { alert('Network error — please retry.'); btn.disabled = false; }
    });
  });

  // Delete (dispatch to the right endpoint by type)
  wrap.querySelectorAll('.btn-del-anyrule').forEach(btn => {
    btn.addEventListener('click', async () => {
      const rid = btn.dataset.rid;
      const rtype = btn.dataset.rtype;
      const label = rtype === 'routing' ? 'routing' : 'ignore';
      if (!confirm('Delete this ' + label + ' rule? This cannot be undone.')) return;
      const endpoint = rtype === 'routing' ? '/routing-rules/' : '/rules/';
      btn.disabled = true;
      btn.textContent = 'Deleting…';
      try {
        const r = await fetch(endpoint + encodeURIComponent(rid), { method: 'DELETE' });
        if (r.ok) { loadRules(); }
        else { const rb = await r.json().catch(() => ({})); alert(r.status === 403 ? 'Not authorised.' : (rb.detail || 'Error ' + r.status)); btn.disabled = false; btn.textContent = 'Delete'; }
      } catch (_) { alert('Network error — please retry.'); btn.disabled = false; btn.textContent = 'Delete'; }
    });
  });

  // Edit (open the correct form for the row type)
  wrap.querySelectorAll('.btn-edit-anyrule').forEach(btn => {
    btn.addEventListener('click', () => {
      const rid = btn.dataset.rid;
      const rtype = btn.dataset.rtype;
      const editRow = document.getElementById('anyrule-edit-row-' + rtype + '-' + rid);
      if (!editRow) return;
      const isOpen = editRow.style.display !== 'none';
      if (isOpen) { editRow.style.display = 'none'; return; }
      wrap.querySelectorAll('tr[id^="anyrule-edit-row-"]').forEach(r => { r.style.display = 'none'; });
      editRow.style.display = 'table-row';
      const rule = rulesData.find(r => r.rule_id === rid && r._type === rtype);
      const td = editRow.querySelector('td');
      if (!td || !rule) return;
      td.style.padding = '10px 14px';
      if (rtype === 'routing') {
        td.innerHTML = routingRuleFormHtml(rule);
        wireRoutingRuleForm(td, rule, async (body) => {
          return fetch('/routing-rules/' + encodeURIComponent(rid), { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        }, () => { editRow.style.display = 'none'; loadRules(); });
      } else {
        td.innerHTML = ignoreRuleFormHtml(rule);
        wireIgnoreRuleForm(td, rule, async (body) => {
          return fetch('/rules/' + encodeURIComponent(rid), { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        }, () => { editRow.style.display = 'none'; loadRules(); });
      }
    });
  });
}

// Wire up a rendered ignoreRuleFormHtml form inside container el.
// submitFn: async (body) => Response
// onSuccess: () => void
function wireIgnoreRuleForm(el, existingRule, submitFn, onSuccess) {
  let formPreset = existingRule
    ? (existingRule.alarm_name_prefix ? 'prefix' : (existingRule.alarm_name ? 'exact' : 'app'))
    : 'exact';

  function updatePresetUi() {
    el.querySelectorAll('[data-irpreset]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.irpreset === formPreset);
    });
    const alarmInput = el.querySelector('.ir-alarm');
    const alarmLabel = el.querySelector('.ir-alarm-label');
    if (alarmInput) {
      const isApp = formPreset === 'app';
      alarmInput.disabled = isApp;
      alarmInput.style.opacity = isApp ? '0.4' : '';
    }
    if (alarmLabel) {
      alarmLabel.textContent = formPreset === 'prefix' ? 'Alarm name prefix' : 'Alarm name';
    }
  }

  el.querySelectorAll('[data-irpreset]').forEach(btn => {
    btn.addEventListener('click', () => { formPreset = btn.dataset.irpreset; updatePresetUi(); });
  });

  const cancelBtn = el.querySelector('.ir-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', onSuccess);

  const submitBtn = el.querySelector('.ir-submit');
  const errEl = el.querySelector('.ir-err');
  if (submitBtn && CAN_WRITE) {
    submitBtn.addEventListener('click', async () => {
      const appVal  = (el.querySelector('.ir-app')  || {}).value || '';
      const alarmV  = (el.querySelector('.ir-alarm') || {}).value || '';
      const envVal  = (el.querySelector('.ir-env')  || {}).value || '';
      const acctVal = (el.querySelector('.ir-acct') || {}).value || '';
      const noteVal = (el.querySelector('.ir-note') || {}).value || '';
      if (errEl) errEl.textContent = '';
      const body = {};
      if (appVal.trim())  body.app_name    = appVal.trim();
      if (envVal.trim())  body.environment = envVal.trim();
      if (acctVal.trim()) body.account_id  = acctVal.trim();
      if (noteVal.trim()) body.note        = noteVal.trim();
      if (formPreset === 'exact'  && alarmV.trim()) body.alarm_name        = alarmV.trim();
      if (formPreset === 'prefix' && alarmV.trim()) body.alarm_name_prefix = alarmV.trim();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';
      try {
        const r = await submitFn(body);
        if (r.ok) {
          onSuccess();
        } else {
          const rb = await r.json().catch(() => ({}));
          const msgs = { 403: 'Not authorised.', 404: 'Rule not found.', 422: rb.detail || 'Invalid rule — include at least one matcher field.' };
          if (errEl) errEl.textContent = msgs[r.status] || ('Error ' + r.status);
          submitBtn.disabled = false;
          submitBtn.textContent = existingRule ? 'Save changes' : 'Create rule';
        }
      } catch (_) {
        if (errEl) errEl.textContent = 'Network error — please retry.';
        submitBtn.disabled = false;
        submitBtn.textContent = existingRule ? 'Save changes' : 'Create rule';
      }
    });
  }
}

function routingRuleFormHtml(rule) {
  const r = rule || {};
  const title = rule ? 'Edit Routing Rule' : 'New Routing Rule';
  const priority = r.priority != null ? r.priority : 50;
  const streams = Array.isArray(r.streams) ? r.streams : ['TEAM', 'CENTRAL'];
  const teamChk  = streams.includes('TEAM')    ? 'checked' : '';
  const centralChk = streams.includes('CENTRAL') ? 'checked' : '';
  const enabledChk = (r.enabled === false) ? '' : 'checked';
  const sevOptions = ['', 'SEV1', 'SEV2', 'SEV3', 'SEV4'].map(s => {
    const sel = (r.severity_override || '') === s ? 'selected' : '';
    return `<option value="${esc(s)}" ${sel}>${s || '(derived — no override)'}</option>`;
  }).join('');
  const polOptions = escalationPolicies.length
    ? escalationPolicies.map(p => {
        const sel = r.escalation_policy_id === p.policy_id ? 'selected' : '';
        return `<option value="${esc(p.policy_id)}" ${sel}>${esc(p.name)}</option>`;
      }).join('')
    : `<option value="" disabled>No escalation policies configured.</option>`;
  const polRequired = !escalationPolicies.length ? 'disabled' : '';
  return `
    <div class="settings-card" style="max-width:none;background:var(--surface-2);">
      <div class="settings-card-title">${esc(title)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;max-width:600px;margin-bottom:10px;">
        <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;">
          Priority <span style="text-transform:none;font-size:10px;color:var(--text-faint);">(required, lower = evaluated first)</span>
          <input type="number" class="rr-priority" value="${esc(String(priority))}" min="1" max="9999"
            style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);">
        </label>
        <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;">
          Escalation policy <span style="text-transform:none;font-size:10px;color:var(--red);">required</span>
          <select class="rr-policy" ${polRequired}
            style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:inherit;">
            ${polOptions}
          </select>
        </label>
        <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;">
          Alarm name prefix
          <input type="text" class="rr-prefix" value="${esc(r.alarm_name_prefix||'')}" placeholder="MyApp-"
            style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);">
        </label>
        <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;">
          Alarm name regex
          <input type="text" class="rr-regex" value="${esc(r.alarm_name_regex||'')}" placeholder="^MyApp-.*-High$"
            style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);">
        </label>
        <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;">
          Namespace prefix
          <input type="text" class="rr-ns" value="${esc(r.namespace_prefix||'')}" placeholder="AWS/Lambda"
            style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);">
        </label>
        <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;">
          Severity override
          <select class="rr-sev"
            style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:inherit;">
            ${sevOptions}
          </select>
        </label>
      </div>
      <div style="display:flex;gap:20px;align-items:center;margin-bottom:10px;flex-wrap:wrap;">
        <div style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;">Streams</div>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;">
          <input type="checkbox" class="rr-stream-team" ${teamChk}> TEAM
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;">
          <input type="checkbox" class="rr-stream-central" ${centralChk}> CENTRAL
        </label>
        <div style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;margin-left:20px;">Enabled</div>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;">
          <input type="checkbox" class="rr-enabled" ${enabledChk}>
        </label>
      </div>
      <div class="settings-row">
        <button class="btn-primary rr-submit">${esc(rule ? 'Save changes' : 'Create routing rule')}</button>
        <button class="btn-sm rr-cancel">Cancel</button>
        <span class="rr-err" style="font-size:12px;color:var(--red);"></span>
      </div>
    </div>`;
}

function wireRoutingRuleForm(el, existingRule, submitFn, onSuccess) {
  const cancelBtn = el.querySelector('.rr-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', onSuccess);

  const submitBtn = el.querySelector('.rr-submit');
  const errEl = el.querySelector('.rr-err');
  if (submitBtn && CAN_WRITE) {
    submitBtn.addEventListener('click', async () => {
      const priorityVal = parseInt((el.querySelector('.rr-priority') || {}).value || '', 10);
      const policyVal   = (el.querySelector('.rr-policy')  || {}).value || '';
      const prefixVal   = (el.querySelector('.rr-prefix')  || {}).value || '';
      const regexVal    = (el.querySelector('.rr-regex')   || {}).value || '';
      const nsVal       = (el.querySelector('.rr-ns')      || {}).value || '';
      const sevVal      = (el.querySelector('.rr-sev')     || {}).value || '';
      const teamVal     = !!(el.querySelector('.rr-stream-team')    || {}).checked;
      const centralVal  = !!(el.querySelector('.rr-stream-central') || {}).checked;
      const enabledVal  = !!(el.querySelector('.rr-enabled')        || {}).checked;
      if (errEl) errEl.textContent = '';
      if (!policyVal) {
        if (errEl) errEl.textContent = 'Escalation policy is required.';
        return;
      }
      if (!priorityVal || isNaN(priorityVal)) {
        if (errEl) errEl.textContent = 'Priority is required (positive integer).';
        return;
      }
      const body = { priority: priorityVal, escalation_policy_id: policyVal, enabled: enabledVal };
      if (prefixVal.trim()) body.alarm_name_prefix = prefixVal.trim();
      if (regexVal.trim())  body.alarm_name_regex  = regexVal.trim();
      if (nsVal.trim())     body.namespace_prefix  = nsVal.trim();
      if (sevVal)           body.severity_override = sevVal;
      const streams = [];
      if (teamVal)    streams.push('TEAM');
      if (centralVal) streams.push('CENTRAL');
      if (streams.length) body.streams = streams;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';
      try {
        const r = await submitFn(body);
        if (r.ok) {
          onSuccess();
        } else {
          const rb = await r.json().catch(() => ({}));
          const msgs = { 403: 'Not authorised.', 404: 'Rule not found.', 422: rb.detail || 'Invalid rule — check regex syntax and required fields.' };
          if (errEl) errEl.textContent = msgs[r.status] || ('Error ' + r.status);
          submitBtn.disabled = false;
          submitBtn.textContent = existingRule ? 'Save changes' : 'Create routing rule';
        }
      } catch (_) {
        if (errEl) errEl.textContent = 'Network error — please retry.';
        submitBtn.disabled = false;
        submitBtn.textContent = existingRule ? 'Save changes' : 'Create routing rule';
      }
    });
  }
}
</script>
</body>
</html>
