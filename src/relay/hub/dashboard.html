  wireAiButton('btn-inc-brief', '/brief', 'AI brief');
  wireAiButton('btn-inc-aar', '/aar', 'After-action report');

  // Ignore… button — toggle an inline form panel (no modal).
  // Add rule… button — one panel that authors EITHER an ignore rule OR a
  // routing rule, chosen by an Action toggle. Ignore is the default (the
  // common case from an incident: "stop showing me this"). Both actions store
  // into the same rules table (IGNORE#/ROUTING# rows) via their endpoints.
  (function wireRuleButton() {
    const ruleBtn = document.getElementById('btn-rule-inc');
    if (!ruleBtn) return;
    const panel = document.getElementById('inc-rule-panel');
    // Action state: 'ignore' | 'route'
    let ruleAction = 'ignore';
    // Ignore preset state: 'exact' | 'prefix' | 'app'
    let ignPreset = 'exact';

    function actionToggleHtml() {
      return `
        <div style="margin-bottom:12px;">
          <div style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Action</div>
          <div class="maint-toggle-group">
            <button class="maint-toggle-btn${ruleAction==='ignore'?' active':''}" id="rule-action-ignore" type="button">Ignore &mdash; drop this alarm</button>
            <button class="maint-toggle-btn${ruleAction==='route'?' active':''}" id="rule-action-route" type="button">Route &mdash; send it somewhere</button>
          </div>
        </div>`;
    }

    function wireActionToggle() {
      const ign = document.getElementById('rule-action-ignore');
      const rte = document.getElementById('rule-action-route');
      if (ign) ign.addEventListener('click', () => { if (ruleAction !== 'ignore') { ruleAction = 'ignore'; renderPanel(); } });
      if (rte) rte.addEventListener('click', () => { if (ruleAction !== 'route')  { ruleAction = 'route';  renderPanel(); } });
    }

    async function renderPanel() {
      if (ruleAction === 'route') {
        await renderRouteForm();
      } else {
        renderIgnoreForm();
      }
    }

    function matchPreview(preset, appName, alarmVal, env) {
      // Client-side AND-match replicating server ignore logic:
      // account_id exact + app_name exact + alarm/prefix/none + env exact.
      const incAcct = inc.account_id || '';
      const incApp  = inc.app_name  || '';
      const incAlarm= inc.alarm_name|| '';
      const incEnv  = inc.environment || '';
      const aMatch = !appName  || appName  === incApp;
      const eMatch = !env      || env      === incEnv;
      let alarmMatch = true;
      if (preset === 'exact')  alarmMatch = !alarmVal || alarmVal === incAlarm;
      if (preset === 'prefix') alarmMatch = !alarmVal || incAlarm.startsWith(alarmVal);
      // preset 'app': no alarm constraint
      return aMatch && eMatch && alarmMatch;
    }

    function renderIgnoreForm() {
      const alarmLabel = ignPreset === 'prefix' ? 'Alarm name prefix' : 'Alarm name';
      const alarmPlaceholder = ignPreset === 'prefix' ? (inc.alarm_name || '') : (inc.alarm_name || '');
      const alarmValue = ignPreset === 'app' ? '' : (inc.alarm_name || '');
      const alarmDisabled = ignPreset === 'app';

      panel.innerHTML = `
        ${actionToggleHtml()}
        <div style="margin-bottom:10px;">
          <div style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Match scope</div>
          <div class="maint-toggle-group">
            <button class="maint-toggle-btn${ignPreset==='exact'?' active':''}" id="ign-preset-exact" type="button">This exact alarm</button>
            <button class="maint-toggle-btn${ignPreset==='prefix'?' active':''}" id="ign-preset-prefix" type="button">Alarm name prefix</button>
            <button class="maint-toggle-btn${ignPreset==='app'?' active':''}" id="ign-preset-app" type="button">All from app in ${esc(inc.environment||'env')}</button>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;max-width:520px;margin-bottom:10px;">
          <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;">
            App name
            <input type="text" id="ign-app" value="${esc(inc.app_name||'')}"
              style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);">
          </label>
          <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;">
            ${esc(alarmLabel)}
            <input type="text" id="ign-alarm" value="${esc(alarmValue)}" placeholder="${esc(alarmPlaceholder)}"
              ${alarmDisabled ? 'disabled' : ''}
              style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);${alarmDisabled?'opacity:0.4;':''}" >
          </label>
          <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;">
            Environment
            <input type="text" id="ign-env" value="${esc(inc.environment||'')}"
              style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);">
          </label>
        </div>
        <label style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:flex;flex-direction:column;gap:4px;margin-bottom:10px;">
          Reason / note (required)
          <textarea id="ign-note" rows="2" placeholder="e.g. known flapping alarm — suppressed permanently"
            style="background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:12px;font-family:var(--mono);resize:vertical;"></textarea>
        </label>
        <div id="ign-preview" style="font-size:11px;margin-bottom:10px;font-family:var(--mono);"></div>
        <div class="settings-row">
          <button class="btn-primary" id="btn-ign-submit">Create ignore rule</button>
          <button class="btn-sm" id="btn-ign-cancel">Cancel</button>
        </div>
        <div id="ign-err"></div>`;

      wireActionToggle();

      // Preset buttons
      ['exact','prefix','app'].forEach(p => {
        const el = document.getElementById('ign-preset-' + p);
        if (el) el.addEventListener('click', () => { ignPreset = p; renderIgnoreForm(); });
      });

      // Live preview
      function updatePreview() {
        const appVal   = (document.getElementById('ign-app')   || {}).value || '';
        const alarmV   = (document.getElementById('ign-alarm') || {}).value || '';
        const envVal   = (document.getElementById('ign-env')   || {}).value || '';
        const prevEl   = document.getElementById('ign-preview');
        if (!prevEl) return;
        const matches = matchPreview(ignPreset, appVal, ignPreset==='app'?'':alarmV, envVal);
        if (matches) {
          prevEl.innerHTML = '<span style="color:var(--green);">&#10003; Will match this incident</span>';
        } else {
          prevEl.innerHTML = '<span style="color:var(--amber);">&#9888; Does not match this incident &mdash; check your fields</span>';
        }
      }
      ['ign-app','ign-alarm','ign-env'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', updatePreview);
      });
      updatePreview();

      // Cancel
      const cancelBtn = document.getElementById('btn-ign-cancel');
      if (cancelBtn) cancelBtn.addEventListener('click', () => { panel.style.display = 'none'; });

      // Submit
      const submitBtn = document.getElementById('btn-ign-submit');
      if (submitBtn && CAN_WRITE) {
        submitBtn.addEventListener('click', async () => {
          const appVal  = (document.getElementById('ign-app')   || {}).value || '';
          const alarmV  = (document.getElementById('ign-alarm') || {}).value || '';
          const envVal  = (document.getElementById('ign-env')   || {}).value || '';
          const noteVal = (document.getElementById('ign-note')  || {}).value || '';
          const errEl   = document.getElementById('ign-err');
          if (!noteVal.trim()) {
            if (errEl) errEl.innerHTML = '<div class="drawer-inline-err">Reason / note is required.</div>';
            return;
          }
          submitBtn.disabled = true;
          submitBtn.textContent = 'Creating…';
          const body = {};
          if (noteVal.trim()) body.note = noteVal.trim();
          if (appVal.trim())  body.app_name = appVal.trim();
          if (envVal.trim())  body.environment = envVal.trim();
          if (ignPreset === 'exact'  && alarmV.trim()) body.alarm_name = alarmV.trim();
          if (ignPreset === 'prefix' && alarmV.trim()) body.alarm_name_prefix = alarmV.trim();
          try {
            const r = await fetch('/incidents/' + encodeURIComponent(inc.correlation_id) + '/ignore', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            if (r.ok) {
              closeDrawer();
              if (activeView === 'incidents') loadIncidents();
              renderAll();
            } else {
              const rb = await r.json().catch(() => ({}));
              const msgs = { 403: 'Not authorised to create ignore rules.', 404: 'Incident not found.', 422: rb.detail || 'Invalid rule — include at least one matcher field.' };
              if (errEl) errEl.innerHTML = '<div class="drawer-inline-err">' + esc(msgs[r.status] || ('Error ' + r.status)) + '</div>';
              submitBtn.disabled = false;
              submitBtn.textContent = 'Create ignore rule';
            }
          } catch (_) {
            if (errEl) errEl.innerHTML = '<div class="drawer-inline-err">Network error — please retry.</div>';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create ignore rule';
          }
        });
      }
    }

    async function renderRouteForm() {
      // Ensure escalation policies are loaded.
      if (!escalationPolicies.length) {
        try {
          const rp = await fetch('/escalation-policies');
          if (rp.ok) { const d = await rp.json(); escalationPolicies = d.policies || []; }
        } catch (_) {}
      }
      panel.innerHTML = `
        ${actionToggleHtml()}
        ${routingRuleFormHtml({
          alarm_name_prefix: inc.alarm_name || '',
          severity_override: inc.severity || '',
          streams: ['TEAM', 'CENTRAL'],
          enabled: true,
          priority: 50,
        })}`;
      wireActionToggle();
      // Replace the inner cancel behaviour to close the panel.
      const innerCancel = panel.querySelector('.rr-cancel');
      if (innerCancel) {
        innerCancel.replaceWith(innerCancel.cloneNode(true));
        panel.querySelector('.rr-cancel').addEventListener('click', () => { panel.style.display = 'none'; });
      }
      // Wire the form submit to POST /incidents/{id}/route.
      wireRoutingRuleForm(panel, null, async (body) => {
        const r = await fetch('/incidents/' + encodeURIComponent(inc.correlation_id) + '/route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        return r;
      }, () => {
        panel.style.display = 'none';
        const errEl = document.getElementById('drawer-ack-err');
        if (errEl) errEl.innerHTML = '<div style="color:var(--green);font-size:12px;padding:4px 0;">&#10003; Routing rule created.</div>';
        if (activeView === 'rules') loadRules();
      });
    }

    ruleBtn.addEventListener('click', async () => {
      const isOpen = panel.style.display !== 'none';
      if (isOpen) {
        panel.style.display = 'none';
      } else {
        panel.style.display = 'block';
        ruleAction = 'ignore';
        ignPreset = 'exact';
        await renderPanel();
      }
    });
  })();
}

// -----------------------------------------------------------------------
// Fleet tile detail drawer
//
// One data-driven panel for BOTH topologies: each section renders only when
// its data is present. A team Hub fills on_call live (it owns the schedule);
// a federated Hub shows the on_call snapshot the owning team pushed up its
// heartbeat. Identical markup either way — the UI never forks on topology.
// -----------------------------------------------------------------------
async function openTile(accountId, appName) {
  drawer.innerHTML = '<span class="close">&times;</span><div style="color:var(--text-dim);">Loading…</div>';
  drawer.querySelector('.close').addEventListener('click', closeDrawer);
  drawer.classList.add('open');
  drawerOverlay.classList.add('open');
  let t;
  try {
    const r = await fetch('/fleet/' + encodeURIComponent(accountId) + '/' + encodeURIComponent(appName));
    if (!r.ok) throw new Error('not found');
    t = await r.json();
  } catch (e) {
    drawer.innerHTML = '<span class="close">&times;</span><p style="color:var(--red);">Deployment not found.</p>';
    drawer.querySelector('.close').addEventListener('click', closeDrawer);
    return;
  }
  renderTile(t);
  // Incidents for this deployment load async — the panel is useful immediately.
  loadTileIncidents(t);
}

function renderTile(t) {
  const status = t.status || 'grey';
  const statusLabel = (STATUS_LABEL[status] || (() => status))(t);
  const liveness = t.liveness || 'unknown';
  const path = Array.isArray(t.service_path) && t.service_path.length
    ? t.service_path.join(' › ') : (t.deployment_id || '—');

  // --- Hierarchy section (from org_path; collapses if absent) ---
  let hierHtml = '';
  if (Array.isArray(t.org_path) && t.org_path.length) {
    const rows = t.org_path.map(n =>
      `<span class="k">${esc(n.level || 'node')}</span><span>${esc(n.name || n.id || '')}</span>`
    ).join('');
    hierHtml = `<div class="section-title">Hierarchy</div><div class="kv">${rows}</div>`;
  }

  // --- Metadata section (owner / gitlab / free-form + aws_tags) ---
  const meta = (t.metadata && typeof t.metadata === 'object') ? t.metadata : {};
  let metaHtml = '';
  const metaRows = [];
  for (const [k, v] of Object.entries(meta)) {
    if (k === 'aws_tags') continue;      // rendered separately as chips
    if (k === 'resource_tags') continue; // rendered separately as chips
    if (v == null || typeof v === 'object') continue;
    metaRows.push(`<span class="k">${esc(k)}</span><span>${metaValueHtml(k, v)}</span>`);
  }
  if (metaRows.length) {
    metaHtml += `<div class="section-title">Metadata</div><div class="kv">${metaRows.join('')}</div>`;
  }
  const awsTags = (meta.aws_tags && typeof meta.aws_tags === 'object') ? meta.aws_tags : null;
  if (awsTags && Object.keys(awsTags).length) {
    const chips = Object.entries(awsTags).map(([k, v]) =>
      `<span class="tag-chip"><span class="tag-k">${esc(k)}</span><span class="tag-v">${esc(v)}</span></span>`
    ).join('');
    metaHtml += `<div class="section-title">AWS tags</div><div class="tag-grid">${chips}</div>`;
  }
  const resourceTags = (meta.resource_tags && typeof meta.resource_tags === 'object') ? meta.resource_tags : null;
  if (resourceTags && Object.keys(resourceTags).length) {
    const chips = Object.entries(resourceTags).map(([k, v]) =>
      `<span class="tag-chip"><span class="tag-k">${esc(k)}</span><span class="tag-v">${esc(String(v))}</span></span>`
    ).join('');
    metaHtml += `<div class="section-title">Resource tags</div><div class="tag-grid">${chips}</div>`;
  }

  // --- On-call section (live on a team hub; snapshot on a federated hub) ---
  let oncallHtml = '';
  const oc = t.on_call;
  if (oc && oc.roles && Object.keys(oc.roles).length) {
    const rows = Object.entries(oc.roles).map(([role, who]) => {
      const name = who && who.name ? who.name : null;
      const cell = name
        ? esc(name)
        : '<span style="color:var(--amber);">— gap —</span>';
      return `<span class="k">${esc(role)}</span><span>${cell}</span>`;
    }).join('');
    const srcNote = oc.source === 'team_snapshot'
      ? ' <span class="oncall-src">team snapshot</span>'
      : ' <span class="oncall-src">live</span>';
    const shift = oc.shift ? ' · ' + esc(oc.shift) : '';
    oncallHtml = `<div class="section-title">On-call${shift}${srcNote}</div><div class="kv">${rows}</div>`;
  }

  drawer.innerHTML = `
    <span class="close">&times;</span>
    <div class="drawer-header-row">
      <div>
        <h2>${esc(t.app_name)} <span class="tile-marker ${esc(status)}" style="font-size:13px;">${MARKER[status] || '?'}</span></h2>
        <div class="sub">${esc(t.account_id)} · ${esc(t.deployment_id || '—')}</div>
      </div>
    </div>
    <div class="kv">
      <span class="k">Status</span><span class="oncall-status-${esc(status)}">${esc(statusLabel)}</span>
      <span class="k">Liveness</span><span>${esc(liveness)}</span>
      <span class="k">Environment</span><span>${esc(t.environment || '—')}</span>
      <span class="k">Service</span><span>${esc(path)}</span>
      <span class="k">Open incidents</span><span>${esc(String(t.open_incidents ?? 0))}${t.worst_severity ? ' · worst ' + esc(t.worst_severity) : ''}</span>
      <span class="k">Last heartbeat</span><span>${esc(fmtAge(t.last_heartbeat_at) || 'never')}</span>
      <span class="k">Registered</span><span>${esc(fmtTime(t.registered_at))}</span>
    </div>
    ${oncallHtml}
    ${hierHtml}
    ${metaHtml}
    <div class="section-title">Open incidents</div>
    <div id="tile-incidents"><div style="color:var(--text-dim);">Loading…</div></div>`;
  drawer.querySelector('.close').addEventListener('click', closeDrawer);
}

async function loadTileIncidents(t) {
  const box = document.getElementById('tile-incidents');
  if (!box) return;
  let list = [];
  try {
    const r = await fetch('/incidents?account_id=' + encodeURIComponent(t.account_id));
    if (r.ok) list = await r.json();
  } catch (_) { /* leave empty */ }
  // Narrow to this deployment (the endpoint filters by account, not deployment).
  const mine = (Array.isArray(list) ? list : []).filter(i =>
    i.app_name === t.app_name &&
    (!t.deployment_id || t.deployment_id === 'unknown' || i.deployment_id === t.deployment_id)
  );
  if (!mine.length) {
    box.innerHTML = '<div style="color:var(--text-dim);">No open incidents.</div>';
    return;
  }
  box.innerHTML = mine.map(i => `
    <div class="inc-row tile-inc-row" data-cid="${esc(i.correlation_id)}">
      <span class="inc-sev ${esc(i.severity || '')}">${esc(i.severity || '')}</span>${i.synthetic ? ' <span class="badge-synthetic">TEST</span>' : ''}
      <span class="inc-app">${esc(i.alarm_name || i.app_name || '')}</span>
      <span class="inc-when">${esc(fmtAge(i.created_at) || '')}</span>
    </div>`).join('');
  // Compose with the existing incident drawer.
  box.querySelectorAll('.tile-inc-row').forEach(row =>
    row.addEventListener('click', () => openIncident(row.dataset.cid)));
}

function fmtTime(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  return isNaN(d) ? esc(isoStr) : d.toLocaleString();
}

// Timeline event detail is a dict {k: v}; render as " — k=v, k2=v2".
function fmtDetail(detail) {
  if (!detail || typeof detail !== 'object') return detail ? ' — ' + esc(detail) : '';
  const parts = Object.entries(detail).map(([k, v]) => esc(k) + '=' + esc(typeof v === 'object' ? JSON.stringify(v) : v));
  return parts.length ? ' — ' + parts.join(', ') : '';
}

// -----------------------------------------------------------------------
// Contacts view
// -----------------------------------------------------------------------
let editingContactId = null;

// Contacts table sort state (persists across re-renders within a session).
let contactSort = { key: 'name', dir: 1 }; // dir: 1 asc, -1 desc

async function loadContacts() {
  const view = document.getElementById('view-contacts');
  view.innerHTML = '<div style="color:var(--text-dim);padding:20px;">Loading…</div>';
  let contacts = [];
  let avMap = new Map();
  let shiftCounts = new Map();
  try {
    const [r1, r2, r3] = await Promise.all([
      fetch('/contacts'),
      fetch('/availability'),
      fetch('/schedule?week=' + getThisMonday()),
    ]);
    if (!r1.ok) throw new Error('fetch failed');
    contacts = await r1.json();
    if (r2.ok) {
      const avList = await r2.json();
      avList.forEach(a => avMap.set(a.contact_id, a));
    }
    if (r3.ok) {
      const sched = await r3.json();
      (sched.slots || []).forEach(s => {
        if (s.contact_id) shiftCounts.set(s.contact_id, (shiftCounts.get(s.contact_id) || 0) + 1);
      });
    }
  } catch (_) {
    view.innerHTML = '<div style="color:var(--red);padding:20px;">Failed to load contacts.</div>';
    return;
  }
  renderContacts(contacts, avMap, shiftCounts);
}

function renderContacts(contacts, avMap = new Map(), shiftCounts = new Map()) {
  const view = document.getElementById('view-contacts');
  const addBtn = CAN_WRITE
    ? `<button class="btn-primary" id="btn-add-contact">+ Add contact</button>`
    : `<button class="btn-primary" disabled title="Read-only: authentication not configured" style="opacity:.45;cursor:not-allowed;">+ Add contact</button>`;

  const DAYS = ['mon','tue','wed','thu','fri','sat','sun'];
  const DAY_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const SHIFTS = ['night','day','evening'];
  const SHIFT_LABELS = ['Night','Day','Eve'];

  // Sort a copy by the active column; on-call/shifts derive from avMap/shiftCounts.
  const sortVal = (c, key) => {
    const av = avMap.get(c.contact_id) || {};
    switch (key) {
      case 'name': return (c.name || '').toLowerCase();
      case 'email': return (c.email || '').toLowerCase();
      case 'phone': return (c.phone || '').toLowerCase();
      case 'oncall': return av.available === true ? 1 : 0;
      case 'shifts': return shiftCounts.get(c.contact_id) || 0;
      default: return '';
    }
  };
  const sorted = contacts.slice().sort((a, b) => {
    const va = sortVal(a, contactSort.key), vb = sortVal(b, contactSort.key);
    if (va < vb) return -1 * contactSort.dir;
    if (va > vb) return 1 * contactSort.dir;
    // Stable tiebreak by name.
    return (a.name || '').toLowerCase().localeCompare((b.name || '').toLowerCase());
  });

  const rows = sorted.length ? sorted.map(c => {
    const av = avMap.get(c.contact_id) || { available: false, slots: {}, ooo: null, roles: [] };
    const isAvail = av.available === true;
    const slots = av.slots || {};
    const ooo = av.ooo || null;
    // Roles this person is eligible for (default primary+secondary if unset).
    const avRoles = Array.isArray(av.roles) && av.roles.length ? av.roles : ['primary', 'secondary'];
    const nShifts = shiftCounts.get(c.contact_id) || 0;
    const onCallCell = isAvail
      ? '<span style="color:var(--green);">&#9679; Yes</span>'
      : '<span style="color:var(--text-dim);">&#9675; No</span>';
    const shiftsCell = nShifts > 0
      ? `<span style="color:var(--text);">${nShifts}</span>`
      : '<span style="color:var(--text-dim);">0</span>';

    // Build grid cells HTML
    const gridCells = DAYS.map((day, di) => {
      const dayCells = SHIFTS.map((shift, si) => {
        const isOn = Array.isArray(slots[day]) && slots[day].includes(shift);
        return `<button class="avail-btn${isOn ? ' on' : ''}" data-day="${day}" data-shift="${shift}"
          ${!CAN_WRITE ? 'disabled' : ''}
          aria-pressed="${isOn}">${isOn ? '✓' : ''}</button>`;
      }).join('');
      return `<span class="avail-day-label">${DAY_LABELS[di]}</span>${dayCells}`;
    }).join('');

    const oooStart = ooo ? ooo.start : '';
    const oooEnd = ooo ? ooo.end : '';

    const copyableCell = (val) => val
      ? `${esc(val)}<button class="copy-btn" data-copy="${esc(val)}" title="Copy">⧉</button>`
      : '—';
    return `
    <tr data-cid="${esc(c.contact_id)}">
      <td>${esc(c.name || '—')}</td>
      <td>${copyableCell(c.email)}</td>
      <td>${copyableCell(c.phone)}</td>
      <td style="text-align:center;">${onCallCell}</td>
      <td style="text-align:center;">${shiftsCell}</td>
      <td>
        <button class="btn-sm btn-test-contact" data-cid="${esc(c.contact_id)}"
          ${!CAN_WRITE ? 'disabled title="Read-only: authentication not configured"' : ''}>Test page</button>
        <span class="test-page-result" data-cid="${esc(c.contact_id)}" style="font-size:11px;margin-left:6px;"></span>
      </td>
      <td style="white-space:nowrap;">
        <button class="btn-sm btn-edit-contact" data-cid="${esc(c.contact_id)}"
          ${!CAN_WRITE ? 'disabled title="Read-only: authentication not configured"' : ''}>Edit</button>
        &nbsp;
        <button class="btn-sm danger btn-del-contact" data-cid="${esc(c.contact_id)}"
          ${!CAN_WRITE ? 'disabled title="Read-only: authentication not configured"' : ''}>Delete</button>
        &nbsp;

  view.innerHTML = `
    <div class="info-banner">&#128274; Contacts (name, email, phone) are stored only in this account&#39;s DynamoDB — never in Git.</div>
    <div class="view-toolbar">
      <h2>Contacts</h2>

    <div id="contact-form-area"></div>
    <div id="contacts-err" class="form-err" style="margin-bottom:8px;"></div>
    <table class="contacts-table">
      <thead><tr>
        ${th('name', 'Name')}
        ${th('email', 'Email')}
        ${th('phone', 'Phone')}
        ${th('oncall', 'On-call', 'text-align:center;')}
        ${th('shifts', 'Shifts (wk)', 'text-align:center;')}
        <th>Test</th><th></th>
      </tr></thead>
      <tbody id="contacts-tbody">${rows}</tbody>
    </table>`;

  // Wire sortable headers — toggle direction if same column, else asc.
  view.querySelectorAll('th.sortable').forEach(h => {
    h.addEventListener('click', () => {
      const key = h.dataset.sort;
      if (contactSort.key === key) contactSort.dir *= -1;
      else contactSort = { key, dir: 1 };
      renderContacts(contacts, avMap, shiftCounts);
    });

  // Wire copy buttons (email / phone) — clipboard with brief inline confirm.
  view.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const val = btn.dataset.copy || '';
      const done = () => { const o = btn.textContent; btn.textContent = '✓'; setTimeout(() => { btn.textContent = o; }, 1200); };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(val).then(done).catch(() => {});
      } else {
        const ta = document.createElement('textarea');
        ta.value = val; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); done(); } catch (_) {}
        document.body.removeChild(ta);
      }
    });
  });

  const addBtnEl = document.getElementById('btn-add-contact');
  if (addBtnEl) addBtnEl.addEventListener('click', () => showContactForm(null, null));

  document.querySelectorAll('.btn-edit-contact').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.cid;
      const c = contacts.find(x => x.contact_id === cid);
      if (c) showContactForm(c, contacts);
    });
  });

  document.querySelectorAll('.btn-del-contact').forEach(btn => {
    btn.addEventListener('click', () => confirmDeleteContact(btn.dataset.cid));
  });

  document.querySelectorAll('.btn-test-contact').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!CAN_WRITE) return;
      const cid = btn.dataset.cid;
      const resultEl = document.querySelector(`.test-page-result[data-cid="${CSS.escape(cid)}"]`);
      btn.disabled = true;
      btn.textContent = 'Testing…';
      if (resultEl) resultEl.textContent = '';
      try {
        const r = await fetch('/contacts/' + encodeURIComponent(cid) + '/test', { method: 'POST' });
        const body = await r.json().catch(() => ({}));
        if (r.status === 403) {
          if (resultEl) { resultEl.textContent = '✗ not authorised'; resultEl.style.color = 'var(--red)'; }
        } else if (r.status === 404) {
          if (resultEl) { resultEl.textContent = '✗ contact not found'; resultEl.style.color = 'var(--red)'; }
        } else if (body.ok) {
          const chs = body.channels || {};
          const sent = Object.entries(chs).filter(([,v]) => v).map(([k]) => k);
          const msg = sent.length ? '✓ sent (' + sent.join(', ') + ')' : '✓ sent';
          if (resultEl) { resultEl.textContent = msg; resultEl.style.color = 'var(--green)'; }
        } else {
          if (resultEl) { resultEl.textContent = '✗ failed'; resultEl.style.color = 'var(--red)'; }
        }
      } catch (_) {
        if (resultEl) { resultEl.textContent = '✗ network error'; resultEl.style.color = 'var(--red)'; }
      }
      btn.disabled = false;
      btn.textContent = 'Test page';
      // Auto-clear result after 8s
      if (resultEl) setTimeout(() => { resultEl.textContent = ''; }, 8000);
    });
  });

  // Wire availability expanders
  document.querySelectorAll('.btn-avail-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.cid;
      const row = document.getElementById('avail-row-' + cid);
      if (!row) return;
      const isOpen = row.classList.toggle('open');
      btn.textContent = 'On-call ' + (isOpen ? '▾' : '▸');
    });
  });

  // Wire master on-call toggle — grey out grid/ooo when off
  document.querySelectorAll('.avail-master-chk').forEach(chk => {
    chk.addEventListener('change', () => {
      const cid = chk.dataset.cid;
      const row = document.getElementById('avail-row-' + cid);
      if (!row) return;
      const on = chk.checked;
      // Enable/disable all three sub-sections together (grid, roles, OOO).
      ['.avail-grid-wrap', '.avail-roles-row', '.avail-ooo-row'].forEach(sel => {
        const el = row.querySelector(sel);
        if (el) el.style.cssText = on ? '' : 'opacity:0.4;pointer-events:none;';
      });
    });
  });

  // Wire avail grid buttons (toggle on/off)
  document.querySelectorAll('.avail-btn').forEach(btn => {
    if (btn.disabled) return;
    btn.addEventListener('click', () => {
      const isOn = btn.classList.toggle('on');
      btn.setAttribute('aria-pressed', isOn);
      btn.textContent = isOn ? '✓' : '';
    });
  });

  // Wire OOO clear
  document.querySelectorAll('.avail-ooo-clear').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.cid;
      const row = document.getElementById('avail-row-' + cid);
      if (!row) return;
      const startInp = row.querySelector('.avail-ooo-start');
      const endInp   = row.querySelector('.avail-ooo-end');
      if (startInp) startInp.value = '';
      if (endInp)   endInp.value   = '';
    });
  });

  // Wire save buttons
  document.querySelectorAll('.avail-save-btn').forEach(btn => {
    if (!CAN_WRITE) return;
    btn.addEventListener('click', async () => {
      const cid = btn.dataset.cid;
      const row = document.getElementById('avail-row-' + cid);
      if (!row) return;
      const masterChk = row.querySelector('.avail-master-chk');
      const gridBtns  = row.querySelectorAll('.avail-btn');
      const startInp  = row.querySelector('.avail-ooo-start');
      const endInp    = row.querySelector('.avail-ooo-end');
      const savedMsg  = document.getElementById('avail-saved-' + cid);

      const available = masterChk ? masterChk.checked : false;
      const slots = {};
      gridBtns.forEach(gb => {
        if (gb.classList.contains('on')) {
          const d = gb.dataset.day, s = gb.dataset.shift;
          if (!slots[d]) slots[d] = [];
          slots[d].push(s);
        }
      });
      const oooStart = startInp ? startInp.value : '';
      const oooEnd   = endInp   ? endInp.value   : '';
      const ooo = (oooStart && oooEnd) ? { start: oooStart, end: oooEnd } : null;

      const roles = Array.from(row.querySelectorAll('.avail-role-chk'))
        .filter(chk => chk.checked).map(chk => chk.value);

      btn.disabled = true;
      btn.textContent = 'Saving…';
      if (savedMsg) { savedMsg.textContent = ''; savedMsg.style.color = 'var(--green)'; }
      try {
        const r = await fetch('/availability/' + encodeURIComponent(cid), {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ available, slots, ooo, roles }),
        });
        if (r.ok) {
          if (savedMsg) { savedMsg.textContent = '✓ saved'; }
          setTimeout(() => { if (savedMsg) savedMsg.textContent = ''; }, 4000);
        } else {
          const body = await r.json().catch(() => ({}));
          if (savedMsg) {
            savedMsg.textContent = r.status === 403 ? '✗ not authorised' : ('✗ ' + (body.detail || 'Error ' + r.status));
            savedMsg.style.color = 'var(--red)';
          }
        }
      } catch (_) {
        if (savedMsg) { savedMsg.textContent = '✗ network error'; savedMsg.style.color = 'var(--red)'; }
      }
      btn.disabled = false;
      btn.textContent = 'Save';
    });
  });
}

async function confirmDeleteContact(contactId) {
  const errEl = document.getElementById('contacts-err');
  if (errEl) errEl.textContent = '';
  // Inline confirm: replace the row's delete button text.
  const btn = document.querySelector(`.btn-del-contact[data-cid="${CSS.escape(contactId)}"]`);
  if (!btn) return;
  if (btn.dataset.confirming) {
    btn.dataset.confirming = '';
    btn.textContent = 'Delete';
    btn.classList.remove('danger');
    return;
  }
  btn.dataset.confirming = '1';
  btn.textContent = 'Confirm?';
  btn.classList.add('danger');
  // Auto-reset after 4s.
  setTimeout(() => {
    if (btn.dataset.confirming) { btn.dataset.confirming = ''; btn.textContent = 'Delete'; }
  }, 4000);
  btn.addEventListener('click', async function handler() {
    if (!btn.dataset.confirming) return;
    btn.removeEventListener('click', handler);
    try {
      const r = await fetch('/contacts/' + encodeURIComponent(contactId), { method: 'DELETE' });
      if (r.ok) {
        loadContacts();
      } else {
        const body = await r.json().catch(() => ({}));
        if (errEl) errEl.textContent = r.status === 403 ? 'Not authorised.' : (body.detail || ('Error ' + r.status));
      }
    } catch (_) { if (errEl) errEl.textContent = 'Network error.'; }
  }, { once: true });
}

function fmtDuration(seconds) {
  if (seconds === null || seconds === undefined) return '—';
  const s = Math.round(seconds);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  if (s < 86400) return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
  return Math.floor(s / 86400) + 'd ' + Math.floor((s % 86400) / 3600) + 'h';
}

async function loadMetrics() {
  const view = document.getElementById('view-metrics');
  view.innerHTML = '<div style="color:var(--text-dim);padding:20px;">Loading…</div>';
  let m;
  try {
    const r = await fetch('/metrics');
    if (!r.ok) throw new Error('fetch failed');
    m = await r.json();
  } catch (_) {
    view.innerHTML = '<div style="color:var(--red);padding:20px;">Failed to load metrics.</div>';
    return;
  }

  const tta = m.time_to_ack_seconds || {};
  const ttr = m.time_to_resolve_seconds || {};

  const card = (label, value, sub) => `
    <div class="metric-card">
      <div class="metric-value">${esc(String(value))}</div>
      <div class="metric-label">${esc(label)}</div>
      ${sub ? `<div class="metric-sub">${esc(sub)}</div>` : ''}
    </div>`;

  // Severity + source breakdown bars.
  const sevOrder = ['SEV1', 'SEV2', 'SEV3', 'SEV4'];
  const sevColors = { SEV1: 'var(--red)', SEV2: 'var(--red)', SEV3: 'var(--amber)', SEV4: 'var(--slate)' };
  const bySev = m.by_severity || {};
  const sevMax = Math.max(1, ...sevOrder.map(s => bySev[s] || 0));
  const sevBars = sevOrder.map(s => `
    <div class="bar-row">
      <span class="bar-key">${s}</span>
      <span class="bar-track"><span class="bar-fill" style="width:${((bySev[s] || 0) / sevMax * 100).toFixed(0)}%;background:${sevColors[s]};"></span></span>
      <span class="bar-val">${bySev[s] || 0}</span>
    </div>`).join('');

  const bySource = m.by_source || {};
  const srcRows = Object.keys(bySource).length
    ? Object.entries(bySource).map(([k, v]) => `<span class="tally-chip">${esc(k)}: ${v}</span>`).join('')
    : '<span style="color:var(--text-dim);">none</span>';

  const durTable = (title, st) => `
    <div class="metric-dur">
      <div class="metric-dur-title">${esc(title)}</div>
      <table class="metric-dur-table">
        <tr><td>median (p50)</td><td>${fmtDuration(st.p50)}</td></tr>
        <tr><td>mean</td><td>${fmtDuration(st.mean)}</td></tr>
        <tr><td>p90</td><td>${fmtDuration(st.p90)}</td></tr>
        <tr><td>max</td><td>${fmtDuration(st.max)}</td></tr>
        <tr><td>samples</td><td>${st.count || 0}</td></tr>
      </table>
    </div>`;

  const synthCount = m.synthetic_total || 0;
  const synthBanner = synthCount > 0 ? `
    <div class="synthetic-metrics-note">
      <span class="badge-synthetic">TEST DATA</span>
      ${synthCount} of ${m.total} incident${m.total === 1 ? '' : 's'} in these figures ${synthCount === 1 ? 'is' : 'are'} synthetic (test) data.
      Clear them from <a href="#" class="synth-purge-link">Maintenance → Purge</a> when you're done verifying.
    </div>` : '';

  view.innerHTML = `
    <div class="view-toolbar"><h2>Metrics</h2>
      <span style="font-size:11px;color:var(--text-dim);margin-left:auto;">All incidents in this scope</span>
    </div>
    ${synthBanner}
    <div class="metric-cards">
      ${card('Total incidents', m.total, synthCount > 0 ? synthCount + ' synthetic' : '')}
      ${card('Open', m.open)}
      ${card('Resolved', m.resolved)}
      ${card('Acknowledged', m.acknowledged)}
      ${card('MTTR (median)', fmtDuration(ttr.p50), 'time to resolve')}
      ${card('Time to ack (median)', fmtDuration(tta.p50), 'time to first ack')}
    </div>
    <div class="metric-grid">
      <div class="metric-panel">
        <h3>By severity</h3>
        ${sevBars}
      </div>
      <div class="metric-panel">
        <h3>By source</h3>
        <div class="schedule-tallies">${srcRows}</div>
        <h3 style="margin-top:16px;">Durations</h3>
        <div class="metric-durs">
          ${durTable('Time to resolve (MTTR)', ttr)}
          ${durTable('Time to first ack', tta)}
        </div>
      </div>
    </div>`;

  // Deep-link the "Maintenance → Purge" hint to the Maintenance view.
  const purgeLink = view.querySelector('.synth-purge-link');
  if (purgeLink) {
    purgeLink.addEventListener('click', (e) => { e.preventDefault(); navTo('maintenance'); });
  }
}

// On-Call view — purely schedule-backed. Shows who Relay would page right now
// for each role (primary/secondary/manager), resolved from the generated
// schedule in the team timezone. Rotations were removed; manage coverage on
// the Schedule screen.
const ONCALL_ROLE_ORDER = ['primary', 'secondary', 'manager'];
const ONCALL_ROLE_LABELS = { primary: 'Primary', secondary: 'Secondary', manager: 'Manager' };

async function loadOncall() {
  const view = document.getElementById('view-oncall');
  view.innerHTML = '<div style="color:var(--text-dim);padding:20px;">Loading…</div>';
  let data;
  try {
    const r1 = await fetch('/oncall');
    if (!r1.ok) throw new Error('fetch failed');
    data = await r1.json();
  } catch (_) {
    view.innerHTML = '<div style="color:var(--red);padding:20px;">Failed to load on-call data.</div>';
    return;
  }

  const noc = data.now_on_call;

  // No schedule covers this moment.
  if (!noc) {
    view.innerHTML = `
      <div class="view-toolbar"><h2>On-Call</h2></div>
      <div style="color:var(--text-dim);padding:40px 0;text-align:center;font-size:15px;">
        No on-call coverage scheduled for right now.<br>
        Generate a schedule on the <b>Schedule</b> screen to set who is on call.
      </div>`;
    return;
  }

  const shift = esc(noc.shift || '');
  const roles = noc.roles || {};
  // Order known roles first, then any extra roles the API returned.
  const roleKeys = ONCALL_ROLE_ORDER.filter(r => r in roles)
    .concat(Object.keys(roles).filter(r => !ONCALL_ROLE_ORDER.includes(r)));

  const cards = roleKeys.map(role => {
    const r = roles[role] || {};
    const label = ONCALL_ROLE_LABELS[role] || (role.charAt(0).toUpperCase() + role.slice(1));
    const who = (r.contact_id && !r.gap)
      ? `<div class="oncall-now-who"><span style="color:var(--green);font-size:11px;vertical-align:middle;">&#9632;</span> ${esc(r.name || r.contact_id)}</div>`
      : `<div class="oncall-now-who" style="color:var(--red);"><span style="font-size:11px;vertical-align:middle;">&#9632;</span> COVERAGE GAP</div>`;
    return `
      <div class="oncall-card${(r.gap || !r.contact_id) ? ' gap' : ''}">
        <div class="oncall-card-title">${esc(label)}</div>
        <div class="oncall-card-team">${shift} shift</div>
        ${who}
      </div>`;
  }).join('');

  view.innerHTML = `
    <div class="view-toolbar"><h2>On-Call</h2></div>
    <div class="oncall-sub">On call right now &middot; ${shift} shift &middot; times in ${esc(TEAM_TZ)}</div>
    <div class="oncall-grid">${cards}</div>
    <div class="oncall-foot">Coverage is managed on the <a href="#" id="oncall-to-schedule">Schedule</a> screen.</div>`;

  const link = document.getElementById('oncall-to-schedule');
  if (link) link.addEventListener('click', (e) => { e.preventDefault(); navTo('schedule'); });
}

function renderSettings(cfg, sys) {
