# We run the gitleaks binary directly (MIT-licensed, free for all use) rather than
# using gitleaks/gitleaks-action, which requires a paid license for organization-owned repos.

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download and run Gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.21.2"
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}" \
            -o "${TARBALL}"
          tar -xzf "${TARBALL}" gitleaks
          chmod +x gitleaks
          ./gitleaks git --redact --exit-code 1 --verbose .
