# Builds a multi-arch container image (linux/amd64 + linux/arm64) and pushes it
# to ghcr.io/westport-partners/relay. The package will be private by default until
# made public in the repo's Packages settings (Settings → Packages → Change visibility).

name: Publish image

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/westport-partners/relay
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RELAY_BUILD_SHA=${{ github.sha }}
            RELAY_BUILD_TIME=${{ github.event.repository.updated_at }}

  publish-templates:
    name: Publish CFN templates + BYOR policy docs
    # Only a real version-tag push (not the main-branch push or manual dispatch
    # this workflow also triggers on) creates a release to attach assets to.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[infra]"

      - name: Synth release templates + BYOR policy bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/relay-synth-release-templates.sh "$VERSION"

      - name: Create or update GitHub release with artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" cdk.out/release-artifacts/*.json --clobber
          else
            gh release create "$GITHUB_REF_NAME" cdk.out/release-artifacts/*.json --generate-notes
          fi
