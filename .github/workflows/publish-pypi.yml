# Publish the relay wheel + sdist to PyPI using Trusted Publishing (OIDC).
# One-time PyPI setup required before the first run:
#   1. On PyPI, go to relay project → Publishing → Add a trusted publisher.
#   2. Set: GitHub owner = <org/user>, repo = incident-manager,
#      workflow = publish-pypi.yml, environment = pypi.
# No API token is stored; PyPI mints a short-lived token via OIDC at runtime.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
