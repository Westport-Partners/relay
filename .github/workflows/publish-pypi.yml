# Publish the relay-westport wheel + sdist to PyPI using Trusted Publishing (OIDC).
# One-time PyPI setup required before the first run (pending publisher, since the
# project does not exist yet):
#   1. On PyPI, go to Account → Publishing → Add a pending publisher.
#   2. Set: PyPI project = relay-westport, GitHub owner = Westport-Partners,
#      repo = relay, workflow = publish-pypi.yml, environment = pypi.
# No API token is stored; PyPI mints a short-lived token via OIDC at runtime.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
