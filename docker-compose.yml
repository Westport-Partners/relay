# Relay local-mock harness (collapsed-single-container plan §6).
#
# Boots the always-on Relay container fully OFFLINE against DynamoDB-Local — no
# AWS account, no credentials. One command brings up a working dashboard you can
# fire alarms at:
#
#   docker compose up             # pulls ghcr.io/westport-partners/relay:latest (no --build needed)
#   ./scripts/relay-fire.sh       # fire fixtures/alarms/lambda-error.json
#   open http://localhost:8080/   # watch the tile go red
#
# Contributors building from source:
#   docker compose build          # builds locally into ghcr.io/westport-partners/relay:latest
#   docker compose up --build     # build + start in one step
#
# FULL DEMO (self-populating): one command brings up a Hub that fills its own
# big-board with a fake agency (40 deployments, 25 people, on-call schedule,
# routing rules) and trickles fake incidents — nothing else to run:
#
#   RELAY_DEMO=true docker compose up
#
# The `relay` service reads RELAY_DEMO from your shell (default false), so the
# same compose file serves both the bare and the self-demoing modes.
#
# SNS paging is a no-op here (no topic ARN); the team-page leg logs a harmless
# isolated failure. DynamoDB (incidents, fleet tiles, escalation deadlines,
# contacts, schedule) is fully exercised against DynamoDB-Local.

services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8000:8000"

  bootstrap:
    image: ghcr.io/westport-partners/relay:latest
    build: .
    depends_on:
      - dynamodb
    environment:
      RELAY_AWS_ENDPOINT_URL: http://dynamodb:8000
      RELAY_TABLE_NAME: relay-local
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
    # Create the table + GSI and seed demo contacts, then exit.
    entrypoint: ["python", "/app/scripts/relay-local-bootstrap.py"]

  relay:
    image: ghcr.io/westport-partners/relay:latest
    build: .
    depends_on:
      # Wait for the bootstrap container to FINISH (table + GSI created), not just
      # start — otherwise relay races it and the config-rule seed scan hits a
      # non-existent table (routing/ignore stores fall back to 503).
      bootstrap:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      RELAY_RUNTIME: local-mock
      RELAY_ALLOW_INGEST: "true"
      RELAY_AWS_ENDPOINT_URL: http://dynamodb:8000
      RELAY_TABLE_NAME: relay-local
      RELAY_FLEET_TABLE_NAME: relay-local
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      RELAY_CONFIG_SOURCE: local
      RELAY_CONFIG_DIR: /app/config
      # auth.py reads RELAY_AUTH_MODE / RELAY_DEV_USER (NOT the RELAY_UI_* names);
      # dev mode gives a fixed writer identity so the dashboard + write endpoints
      # (contacts, schedule, synthetic incidents) are usable locally without an IdP.
      RELAY_AUTH_MODE: dev
      RELAY_DEV_USER: operator
      LOG_LEVEL: INFO
      # Self-populating demo: when RELAY_DEMO=true (read from your shell, default
      # false), the entrypoint runs the test-env harness against this Hub after
      # it comes up — fake org, people, schedule, rules, and a drip of incidents.
      RELAY_DEMO: "${RELAY_DEMO:-false}"
      RELAY_DEMO_MODE: "${RELAY_DEMO_MODE:-drip}"
      RELAY_DEMO_INTERVAL: "${RELAY_DEMO_INTERVAL:-20}"
