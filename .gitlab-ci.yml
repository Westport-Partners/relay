# =============================================================================
# Relay — GitLab CI/CD pipeline
# =============================================================================
# Deploys a Relay team or federated-hub CDK stack into the AWS account where the
# GitLab runner lives.
#
# ASSUMPTIONS
#   * A GitLab runner is registered IN the target AWS account, and that runner
#     (EC2 instance profile or ECS task role) has the IAM permissions CDK needs
#     to deploy (see infra/RUNNER_IAM.md). We therefore do NOT take AWS access
#     keys as inputs — the SDK picks up the runner's role automatically. The
#     account ID is discovered at runtime via `aws sts get-caller-identity`.
#   * The runner is selected by the `runner_tag` input (see below). Every job
#     carries that tag so the pipeline runs ONLY on the in-account runner — an
#     untagged job can land on any runner and silently target the wrong account.
#
# HOW A TEAM USES IT
#   1. Clone/fork this repo into their GitLab.
#   2. CI/CD > Pipelines > "Run pipeline" (web UI).
#   3. Pick the inputs (deploy_type = team | federated-hub, plus a few basics).
#   4. Run. The pipeline validates inputs, tests, synthesizes, and (on the manual
#      `deploy` job) deploys the selected stack.
#
# The web "Run pipeline" screen renders the `spec.inputs` below as a form with
# dropdowns and defaults.
# =============================================================================

spec:
  inputs:
    deploy_type:
      description: >-
        Which Relay topology to deploy.
        team: one always-on container + data plane in ONE account (default).
        federated-hub: the org-wide aggregator (adds the federation bus); org_id required.
      default: "team"
      options:
        - "team"
        - "federated-hub"

    runner_tag:
      description: >-
        REQUIRED in any GitLab with more than one runner. Tag of the runner
        registered in the TARGET AWS account (its instance role provides AWS
        creds). If your project has exactly one runner you may leave this as the
        default and the job runs on it.
      default: "aws-ec2"

    aws_region:
      description: "AWS region to deploy into."
      default: "us-east-1"

    # --- team inputs ---
    team_name:
      description: "REQUIRED for team. Unique team identifier used in resource names + Hub tagging, e.g. payments-api."
      default: ""

    # --- federated-hub inputs ---
    org_id:
      description: "REQUIRED for federated-hub. AWS Organizations ID (o-xxxx) — grants org-scoped PutEvents to the bus."
      default: ""

    # --- compute image ---
    hub_image_uri:
      description: "ECR image URI for the Hub container. Required to DEPLOY compute; leave blank to only test/synth (synth skips the image guard)."
      default: ""

    # --- federation (team forwarding up to a hub) ---
    hub_scope:
      description: "[team] Hub bus ingress scope: local (default, same-account) or local-federated (also forwards SEV1/2 up to a federated hub)."
      default: "local"
      options:
        - "local"
        - "local-federated"

    upstream_hub_bus_arn:
      description: "[team, hub_scope=local-federated] ARN of the upstream federated-hub EventBridge bus to forward events to."
      default: ""

    # --- BYOR / BYOV (locked-down accounts; see docs/byor.md) ---
    ecs_task_role_arn:
      description: "[BYOR] Pre-provisioned ECS task role ARN. Leave blank to let CDK create one. BYOR needs BOTH role ARNs."
      default: ""

    ecs_execution_role_arn:
      description: "[BYOR] Pre-provisioned ECS execution role ARN. Leave blank to let CDK create one. BYOR needs BOTH role ARNs."
      default: ""

    vpc_id:
      description: "[BYOV] Existing VPC id to import. Leave blank to let CDK create a new VPC."
      default: ""

    servicenow_instance:
      description: "[optional] ServiceNow instance hostname, e.g. acme.service-now.com."
      default: ""

    gitlab_repo:
      description: "[optional] GitLab repo path holding config-as-code (escalation/routing), e.g. org/team-relay-config. Blank = use this repo."
      default: ""

    gitlab_secret_name:
      description: "Secrets Manager secret name holding the GitLab API token."
      default: "relay/gitlab-token"

    require_approval:
      description: "CDK approval mode for IAM/security changes during deploy."
      default: "never"
      options:
        - "never"
        - "any-change"
        - "broadening"
---
# ---------------------------------------------------------------------------
# Pipeline-wide config
# ---------------------------------------------------------------------------
# Base image MUST provide Python 3.12+ (pyproject requires-python >= 3.12).
# Debian Bookworm's default python3 is 3.11, which pip rejects — so we start
# from the official python:3.12 image and install Node.js for the CDK CLI in
# the setup anchor below.
image: "python:3.12-bookworm"

variables:
  # Surface the chosen inputs as ordinary env vars for the job scripts.
  RELAY_DEPLOY_TYPE: "$[[ inputs.deploy_type ]]"
  AWS_REGION: "$[[ inputs.aws_region ]]"
  AWS_DEFAULT_REGION: "$[[ inputs.aws_region ]]"
  RELAY_TEAM_NAME: "$[[ inputs.team_name ]]"
  RELAY_ORG_ID: "$[[ inputs.org_id ]]"
  RELAY_HUB_IMAGE_URI: "$[[ inputs.hub_image_uri ]]"
  RELAY_SERVICENOW_INSTANCE: "$[[ inputs.servicenow_instance ]]"
  RELAY_HUB_SCOPE: "$[[ inputs.hub_scope ]]"
  RELAY_UPSTREAM_HUB_BUS_ARN: "$[[ inputs.upstream_hub_bus_arn ]]"
  RELAY_ECS_TASK_ROLE_ARN: "$[[ inputs.ecs_task_role_arn ]]"
  RELAY_ECS_EXECUTION_ROLE_ARN: "$[[ inputs.ecs_execution_role_arn ]]"
  RELAY_VPC_ID: "$[[ inputs.vpc_id ]]"
  RELAY_GITLAB_REPO: "$[[ inputs.gitlab_repo ]]"
  RELAY_GITLAB_SECRET_NAME: "$[[ inputs.gitlab_secret_name ]]"
  RELAY_REQUIRE_APPROVAL: "$[[ inputs.require_approval ]]"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Run only on every job: the runner registered in the target AWS account. An
# untagged job can run on ANY runner and silently target the wrong account.
default:
  tags:
    - "$[[ inputs.runner_tag ]]"

# Only run from the web "Run pipeline" button (this is a deploy tool, not a
# commit-triggered CI). Remove/extend this if you also want MR validation.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'

stages:
  - validate
  - test
  - synth
  - deploy

# ---------------------------------------------------------------------------
# Shared setup: install Node.js (CDK CLI) + app deps. Python 3.12 is already in
# the base image, so we do NOT apt-get python here.
# ---------------------------------------------------------------------------
.python_cdk_setup: &python_cdk_setup
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash - >/dev/null 2>&1
  - apt-get install -y -qq nodejs >/dev/null
  - python3 -m venv .venv
  - . .venv/bin/activate
  - pip install --quiet --upgrade pip
  - pip install --quiet -e ".[dev]" || pip install --quiet -e .
  - pip install --quiet aws-cdk-lib constructs
  - npm install -g aws-cdk@2 >/dev/null 2>&1
  - aws --version >/dev/null 2>&1 || pip install --quiet awscli

cache:
  key: "relay-${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip
    - .venv

# ---------------------------------------------------------------------------
# 0) VALIDATE — fail fast on missing required inputs BEFORE any slow setup.
#    GitLab shows a green "Run pipeline" even with blank required inputs, so the
#    only place to catch them with a clear message is here.
# ---------------------------------------------------------------------------
validate-inputs:
  stage: validate
  script:
    - |
      fail() { echo "ERROR: $*" >&2; exit 1; }
      case "${RELAY_DEPLOY_TYPE}" in
        team)
          [ -n "${RELAY_TEAM_NAME}" ] || fail "team_name is required when deploy_type=team."
          ;;
        federated-hub)
          [ -n "${RELAY_ORG_ID}" ] || fail "org_id is required when deploy_type=federated-hub."
          ;;
        *) fail "deploy_type must be 'team' or 'federated-hub' (got '${RELAY_DEPLOY_TYPE}')." ;;
      esac
      # BYOR needs both role ARNs or neither — one alone is silently ignored by the stack.
      if { [ -n "${RELAY_ECS_TASK_ROLE_ARN}" ] && [ -z "${RELAY_ECS_EXECUTION_ROLE_ARN}" ]; } \
         || { [ -z "${RELAY_ECS_TASK_ROLE_ARN}" ] && [ -n "${RELAY_ECS_EXECUTION_ROLE_ARN}" ]; }; then
        fail "BYOR needs BOTH ecs_task_role_arn and ecs_execution_role_arn (or neither)."
      fi
      echo "Inputs OK: deploy_type=${RELAY_DEPLOY_TYPE}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------------------------------------------------------------------------
# 1) TEST — run the unit suite before anything touches AWS.
# ---------------------------------------------------------------------------
test:
  stage: test
  script:
    - *python_cdk_setup
    - python -m pytest -q
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------------------------------------------------------------------------
# NOTE on portability: all deploy logic lives in scripts/relay-*.sh so the
# SAME code runs locally (Westport/GitHub) and from a GitLab runner here. The
# jobs below are deliberately thin — they set inputs as env vars and call a
# script. The scripts handle account discovery, context assembly, and cdk.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# 2) SYNTH — validate the CloudFormation synthesizes for the chosen role.
#    Runs automatically; uploads the template as an artifact for review.
#    relay-synth.sh passes relay:image_check=false, so this succeeds even
#    before a container image has been built (the common first-use case).
# ---------------------------------------------------------------------------
synth:
  stage: synth
  script:
    - *python_cdk_setup
    - ./scripts/relay-synth.sh
  artifacts:
    paths:
      - cdk.out/*.template.json
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------------------------------------------------------------------------
# 3) DEPLOY — manual gate. Bootstraps CDK if needed, then deploys the stack.
#    `when: manual` so a human clicks "deploy" after reviewing the synth output.
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  script:
    - *python_cdk_setup
    # Bootstrap is idempotent; safe to run every time. Needed once per account/region.
    - ./scripts/relay-bootstrap.sh || true
    - ./scripts/relay-deploy.sh
  artifacts:
    paths:
      - cdk.outputs.json
    expire_in: 1 month
  when: manual
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
