# =============================================================================
# Relay — GitLab CI/CD pipeline
# =============================================================================
# Deploys the Relay Node (per-team) or Hub (central) CDK stack into the AWS
# account where the GitLab runner lives.
#
# ASSUMPTIONS
#   * A GitLab runner is registered IN the target AWS account, and that runner
#     (EC2 instance profile or ECS task role) has the IAM permissions CDK needs
#     to deploy. We therefore do NOT take AWS access keys as inputs — the SDK
#     picks up the runner's role automatically. The account ID is discovered at
#     runtime via `aws sts get-caller-identity`.
#
# HOW A TEAM USES IT
#   1. Clone/fork this repo into their GitLab.
#   2. CI/CD > Pipelines > "Run pipeline" (web UI).
#   3. Pick the inputs (deploy_type = node | hub, plus a few basics).
#   4. Run. The pipeline tests, synthesizes, and (on the manual `deploy` job)
#      deploys the selected stack.
#
# The web "Run pipeline" screen renders the `spec.inputs` below as a form with
# dropdowns and defaults.
# =============================================================================

spec:
  inputs:
    deploy_type:
      description: >-
        Which Relay topology to deploy.
        standalone: Node + local Hub in ONE account, ONE deploy (default — no org needed).
        node: per-team Node only; hub_event_bus_arn required.
        hub: central org-wide Hub only; org_id required.
      default: "standalone"
      options:
        - "standalone"  # Node + local Hub, single account (default — no org required)
        - "node"        # per-team Node only (~200 of these)
        - "hub"         # central org-wide Hub (deploy once per org)

    aws_region:
      description: "AWS region to deploy into."
      default: "us-east-1"

    # --- Node-only inputs (ignored when deploy_type=standalone or hub) ---
    team_name:
      description: "[node/standalone] Unique team identifier (used in resource names + Hub tagging), e.g. payments-api."
      default: ""

    hub_event_bus_arn:
      description: "[node only] ARN of the Hub's EventBridge bus (from the Hub deploy output). Not used for standalone — the local bus ARN is wired automatically."
      default: ""

    # --- Hub-only inputs (ignored when deploy_type=node or standalone) ---
    org_id:
      description: "[hub only] AWS Organizations ID (o-xxxx) — grants org-scoped PutEvents to the bus. Not required for standalone."
      default: ""

    servicenow_instance:
      description: "[hub/standalone] ServiceNow instance hostname, e.g. acme.service-now.com."
      default: ""

    # --- Standalone / local-federated inputs ---
    hub_scope:
      description: "[standalone] Hub bus ingress scope: local (default, same-account only) or local-federated (same-account + forwards up to a central Hub)."
      default: "local"
      options:
        - "local"
        - "local-federated"

    central_hub_bus_arn:
      description: "[standalone, hub_scope=local-federated] ARN of the upstream central Hub EventBridge bus to forward events to."
      default: ""

    # --- Optional, all roles ---
    gitlab_repo:
      description: "GitLab repo path holding the config-as-code (rotations/escalation/routing), e.g. org/team-relay-config. Blank = use this repo."
      default: ""

    gitlab_secret_name:
      description: "Secrets Manager secret name holding the GitLab API token."
      default: "relay/gitlab-token"

    require_approval:
      description: "CDK approval mode for IAM/security changes during deploy."
      default: "never"
      options:
        - "never"
        - "any-change"
        - "broadening"
---
# ---------------------------------------------------------------------------
# Pipeline-wide config
# ---------------------------------------------------------------------------
# A single image that carries Python 3.12 (app + CDK) and Node.js (CDK CLI).
image: "node:20-bookworm"

variables:
  # Surface the chosen inputs as ordinary env vars for the job scripts.
  RELAY_DEPLOY_TYPE: "$[[ inputs.deploy_type ]]"
  AWS_REGION: "$[[ inputs.aws_region ]]"
  AWS_DEFAULT_REGION: "$[[ inputs.aws_region ]]"
  RELAY_TEAM_NAME: "$[[ inputs.team_name ]]"
  RELAY_HUB_EVENT_BUS_ARN: "$[[ inputs.hub_event_bus_arn ]]"
  RELAY_ORG_ID: "$[[ inputs.org_id ]]"
  RELAY_SERVICENOW_INSTANCE: "$[[ inputs.servicenow_instance ]]"
  RELAY_HUB_SCOPE: "$[[ inputs.hub_scope ]]"
  RELAY_CENTRAL_HUB_BUS_ARN: "$[[ inputs.central_hub_bus_arn ]]"
  RELAY_GITLAB_REPO: "$[[ inputs.gitlab_repo ]]"
  RELAY_GITLAB_SECRET_NAME: "$[[ inputs.gitlab_secret_name ]]"
  RELAY_REQUIRE_APPROVAL: "$[[ inputs.require_approval ]]"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Only run from the web "Run pipeline" button (this is a deploy tool, not a
# commit-triggered CI). Remove/extend this if you also want MR validation.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'

stages:
  - test
  - synth
  - deploy

# ---------------------------------------------------------------------------
# Shared setup: install Python, app deps, CDK CLI.
# ---------------------------------------------------------------------------
.python_cdk_setup: &python_cdk_setup
  - apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv >/dev/null
  - python3 -m venv .venv
  - . .venv/bin/activate
  - pip install --quiet --upgrade pip
  - pip install --quiet -e ".[dev]" || pip install --quiet -e .
  - pip install --quiet aws-cdk-lib constructs
  - npm install -g aws-cdk@2 >/dev/null 2>&1
  - aws --version >/dev/null 2>&1 || pip install --quiet awscli

cache:
  key: "relay-${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip
    - .venv

# ---------------------------------------------------------------------------
# 1) TEST — run the unit suite before anything touches AWS.
# ---------------------------------------------------------------------------
test:
  stage: test
  script:
    - *python_cdk_setup
    - python -m pytest -q
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------------------------------------------------------------------------
# NOTE on portability: all deploy logic lives in scripts/relay-*.sh so the
# SAME code runs locally (Westport/GitHub) and from a GitLab runner here. The
# jobs below are deliberately thin — they set inputs as env vars and call a
# script. The scripts handle account discovery, context assembly, and cdk.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# 2) SYNTH — validate the CloudFormation synthesizes for the chosen role.
#    Runs automatically; uploads the template as an artifact for review.
# ---------------------------------------------------------------------------
synth:
  stage: synth
  script:
    - *python_cdk_setup
    - ./scripts/relay-synth.sh
  artifacts:
    paths:
      - cdk.out/*.template.json
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------------------------------------------------------------------------
# 3) DEPLOY — manual gate. Bootstraps CDK if needed, then deploys the stack.
#    `when: manual` so a human clicks "deploy" after reviewing the synth output.
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  script:
    - *python_cdk_setup
    # Bootstrap is idempotent; safe to run every time. Needed once per account/region.
    - ./scripts/relay-bootstrap.sh || true
    - ./scripts/relay-deploy.sh
  artifacts:
    paths:
      - cdk.outputs.json
    expire_in: 1 month
  when: manual
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
